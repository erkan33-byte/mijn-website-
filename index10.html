<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Satoshi 2009 Entropy Pool Simulator (Pure SHA-1 Mixer)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
table { border-collapse: collapse; width: 100%; margin-top: 12px; background: #fff; }
th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; word-break: break-all; text-align: left; }
th { background: #e0e0e0; }
button, input { margin-bottom: 10px; padding: 8px 12px; }
#foundMsg { margin-top: 15px; font-weight: bold; font-size: 18px; color: #d9534f; padding: 10px; border: 2px solid #d9534f; }
.match { background: #0f0; color: #000; font-weight: bold; }
</style>
</head>
<body>
<h2>Satoshi 2009 Entropy Pool Simulator (Pure SHA-1 Mixer)</h2>

<label>Timestamp Begin (ms): <input type="number" id="startTimeInput" value="1199145600000" style="width: 150px;"></label><br>
<label>Timestamp Eind (ms): <input type="number" id="endTimeInput" value="1231006505000" style="width: 150px;"></label><br>
<label>Ruis Bereik Begin (%): <input type="number" id="noiseStartInput" value="49" min="0" max="100" step="0.0001" style="width: 80px;"></label><br>
<label>Ruis Bereik Eind (%): <input type="number" id="noiseEndInput" value="50" min="0" max="100" step="0.0001" style="width: 80px;"></label><br>
<label>PID Begin: <input type="number" id="pidStartInput" value="4" style="width: 80px;"></label><br>
<label>PID Eind: <input type="number" id="pidEndInput" value="65536" style="width: 80px;"></label><br>
<label>TID Begin: <input type="number" id="tidStartInput" value="4" style="width: 80px;"></label><br>
<label>TID Eind: <input type="number" id="tidEndInput" value="128" style="width: 80px;"></label><br>
<label>Aantal workers: <input type="number" id="numWorkers" value="4"></label><br>
<label>Batch grootte: <input type="number" id="batchSizeInput" value="500"></label><br>
<button id="startBtn">Start Pure Entropy Scan</button>
<button id="stopBtn" disabled>Stop</button>

<div id="totaal">Totaal gescand: 0</div>
<div id="foundMsg"></div>

<h3>Worker Status</h3>
<table id="statusTable">
<thead><tr><th>Worker ID</th><th>Systeemstatus (SHA-1 Mix | Vaste Ruis | Tijd | PID | TID)</th></tr></thead>
<tbody></tbody>
</table>

<h3>Resultaten (Laatste per batch)</h3>
<table id="resultTable">
<thead><tr><th>Strategy</th><th>Adres</th><th>Full 256-bit WIF Private Key</th><th>Parameters (Tijd | PID | TID)</th></tr></thead>
<tbody></tbody>
</table>

<script>
const LARGE_ADDRESS_LIST = [
"1FeexV6bAHb8ybZjqQMjJrcCrHGW9sb6uF",
"12tkqA9xSoowkzoERHMWNKsTey55YEBqkv",
"12ib7dApVFvg82TXKycWBNpN8kFyiAN1dr",
"1PeizMg76Cf96nUQrYg8xuoZWLQozU5zGW",
"198aMn6ZYAczwrE5NvNTUMyJ5qkfy4g3Hi",
"1HLvaTs3zR3oev9ya7Pzp3GB9Gqfg6XYJT",
"1GoEGp5LxydquYXp7zuBpVWnp8gzsNgQQS",
"1GDWUJyvtsyFKNjBvH6hpLE3CdaXx33dxP",
"1GDu4EUz2KgeYT4CukDS3qNkiCzg1UfqRA"
];

const workerCode = `
self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
const ec = new elliptic.ec("secp256k1");

function get256BitKeyFromEntropy(entropy) {
    let hash1 = CryptoJS.SHA1(entropy).toString();
    let hash2 = CryptoJS.SHA1(hash1).toString();
    return (hash1 + hash2.substring(0, 24)); 
}

function sha256Hex(hex){ return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hex)).toString(); }
function doubleSha256Hex(hex){ return sha256Hex(sha256Hex(hex)); }
function base58Encode(hex){ 
    const alphabet="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz"; 
    const bytes=Uint8Array.from(hex.match(/.{1,2}/g).map(b=>parseInt(b,16))); 
    let zeros=0; while(zeros<bytes.length && bytes[zeros]===0) zeros++; 
    let num=BigInt("0x"+hex), out=""; 
    while(num>0n){ let r=num%58n; num/=58n; out=alphabet[Number(r)]+out; } 
    return "1".repeat(zeros)+(out||""); 
}
function getUncompressedWif(privHex) {
    let payload = "80" + privHex;
    return base58Encode(payload + doubleSha256Hex(payload).slice(0, 8));
}
function getRandomBigIntInRange(minBI, maxBI) {
    const rangeBI = maxBI - minBI;
    const bits = rangeBI.toString(2).length;
    const bytesCount = Math.ceil(bits / 8);
    let randBytes = new Uint8Array(bytesCount);
    while (true) {
        self.crypto.getRandomValues(randBytes);
        let hex = Array.from(randBytes).map(b => b.toString(16).padStart(2, '0')).join('');
        let num = BigInt("0x" + hex);
        if (num <= rangeBI) return minBI + num;
    }
}

self.onmessage = function(e){
    const { targets, batchSize, id, startTime, endTime, noiseStartHex, noiseEndHex, pidStart, pidEnd, tidStart, tidEnd } = e.data;
    const targetsSet = new Set(targets);
    const startBig = BigInt(startTime), endBig = BigInt(endTime);
    const pidStartBI = BigInt(pidStart), pidEndBI = BigInt(pidEnd);
    const tidStartVal = parseInt(tidStart), tidEndVal = parseInt(tidEnd);
    const noiseStartBI = BigInt(noiseStartHex), noiseEndBI = BigInt(noiseEndHex);
    
    let currentBaseNoise = getRandomBigIntInRange(noiseStartBI, noiseEndBI);
    let currentBaseTime = startBig, currentBasePid = pidStartBI;
    let currentTid = tidStartVal;

    while(true) {
        let batchOut = [];
        for(let i=0; i<batchSize; i++){
            currentTid += 4;
            if (currentTid > tidEndVal) {
                currentTid = tidStartVal;
                currentBasePid += 4n;
                if (currentBasePid > pidEndBI) {
                    currentBasePid = pidStartBI;
                    currentBaseTime += 1n;
                    if (currentBaseTime > endBig) {
                        currentBaseTime = startBig;
                        currentBaseNoise = getRandomBigIntInRange(noiseStartBI, noiseEndBI);
                    }
                }
            }
            
            let entropy = currentBaseNoise.toString(16).padStart(20, '0') + currentBaseTime.toString() + currentBasePid.toString() + currentTid.toString();
            let satoshiPrivKey = get256BitKeyFromEntropy(entropy);
            
            let kp = ec.keyFromPrivate(satoshiPrivKey, 'hex');
            let pub = Array.from(kp.getPublic(false,"array")).map(b=>b.toString(16).padStart(2,'0')).join('');
            let rip = CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(sha256Hex(pub))).toString();
            let addr = base58Encode("00" + rip + doubleSha256Hex("00" + rip).slice(0,8));
            
            if(targetsSet.has(addr)){
                self.postMessage({ found: true, address: addr, wif: getUncompressedWif(satoshiPrivKey), id, time: currentBaseTime.toString(), pid: currentBasePid.toString(), tid: currentTid.toString() });
                return; 
            }
            batchOut.push({ addr, wif: getUncompressedWif(satoshiPrivKey), time: currentBaseTime.toString(), pid: currentBasePid.toString(), tid: currentTid.toString() });
        }
        self.postMessage({ batch: batchOut, id, progress: "Mixer: Pure SHA-1 | Ruis: 0x"+currentBaseNoise.toString(16).substring(0,8)+" | TID: "+currentTid });
    }
};
`;

let workers = [], totaal = 0;
function start() {
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("statusTable").getElementsByTagName('tbody')[0].innerHTML = "";
    document.getElementById("resultTable").getElementsByTagName('tbody')[0].innerHTML = "";
    totaal = 0;
    
    const numWorkers = parseInt(document.getElementById("numWorkers").value);
    const maxNoiseSpace = BigInt("1208925819614629174706175");
    const noiseStartBI = BigInt(Math.floor(Number(maxNoiseSpace) * (parseFloat(document.getElementById("noiseStartInput").value) / 100)));
    const noiseEndBI = BigInt(Math.floor(Number(maxNoiseSpace) * (parseFloat(document.getElementById("noiseEndInput").value) / 100)));
    
    const url = URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'}));

    for(let i=0; i<numWorkers; i++){
        let w = new Worker(url);
        let row = document.getElementById("statusTable").getElementsByTagName('tbody')[0].insertRow();
        row.innerHTML = `<td>Worker ${i+1}</td><td id="prog_${i+1}">Starten...</td>`;
        w.postMessage({ 
            targets: LARGE_ADDRESS_LIST, batchSize: parseInt(document.getElementById("batchSizeInput").value), id: i+1,
            startTime: parseInt(document.getElementById("startTimeInput").value), endTime: parseInt(document.getElementById("endTimeInput").value),
            noiseStartHex: "0x" + noiseStartBI.toString(16), noiseEndHex: "0x" + noiseEndBI.toString(16),
            pidStart: parseInt(document.getElementById("pidStartInput").value), pidEnd: parseInt(document.getElementById("pidEndInput").value),
            tidStart: parseInt(document.getElementById("tidStartInput").value), tidEnd: parseInt(document.getElementById("tidEndInput").value)
        });
        w.onmessage = function(e){
            if(e.data.found){
                let r = document.getElementById("resultTable").getElementsByTagName('tbody')[0].insertRow(0);
                r.className = 'match';
                r.innerHTML = `<td>Worker ${e.data.id} (MATCH!)</td><td>${e.data.address}</td><td>${e.data.wif}</td><td>T: ${e.data.time} | P: ${e.data.pid} | TID: ${e.data.tid}</td>`;
                document.getElementById("foundMsg").textContent = "MATCH GEVONDEN: " + e.data.address;
                stop();
            } else if(e.data.batch){
                totaal += e.data.batch.length;
                document.getElementById("totaal").textContent = "Totaal gescand: " + totaal;
                document.getElementById("prog_" + e.data.id).textContent = e.data.progress;
                let last = e.data.batch[e.data.batch.length-1];
                let tbody = document.getElementById("resultTable").getElementsByTagName('tbody')[0];
                let row = tbody.insertRow(0);
                row.innerHTML = `<td>Worker ${e.data.id}</td><td>${last.addr}</td><td>${last.wif}</td><td>T: ${last.time} | P: ${last.pid} | TID: ${last.tid}</td>`;
                if(tbody.rows.length > 15) tbody.deleteRow(15);
            }
        };
        workers.push(w);
    }
}
function stop() { workers.forEach(w => w.terminate()); workers = []; document.getElementById("startBtn").disabled = false; document.getElementById("stopBtn").disabled = true; }
document.getElementById("startBtn").onclick = start;
document.getElementById("stopBtn").onclick = stop;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kangaroo √N – MITM + Kangaroo</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#07090f;--surface:#0d1117;--panel:#111827;--border:#1f2937;--accent:#00ff99;--accent2:#00c3ff;--text:#e2e8f0;--muted:#6b7280;--warn:#f59e0b}
        body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);padding:20px}
        .container{max-width:750px;margin:0 auto}
        .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
        .card-title{font-size:.6rem;color:var(--accent2);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px}
        .field{display:grid;grid-template-columns:160px 1fr;align-items:center;gap:6px;margin-bottom:8px}
        .field label{font-size:.65rem;color:var(--muted)}
        .field input{background:var(--surface);color:var(--accent);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:inherit;font-size:.7rem;width:100%}
        .field input[type="number"]{max-width:80px}
        .btn-row{display:flex;gap:6px;margin-top:6px}
        .btn{flex:1;padding:8px 12px;font-family:inherit;font-size:.7rem;font-weight:bold;cursor:pointer;border:none;border-radius:4px}
        .btn-start{background:var(--accent);color:#000}
        .btn-stop{background:#ef4444;color:#fff}
        .btn-save{background:var(--accent2);color:#000}
        .btn-load{background:var(--warn);color:#000}
        .btn:disabled{opacity:.3;cursor:not-allowed}
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 10px}
        .stat-cell .label{font-size:.5rem;color:var(--muted);text-transform:uppercase}
        .stat-cell .value{font-size:.85rem;font-weight:bold;color:var(--accent)}
        #statusVal{color:#ef4444}
        #statusVal.running{color:var(--accent)}
        .progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
        .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .3s}
        .log{background:#000;height:100px;overflow-y:scroll;padding:6px 8px;font-size:.6rem;line-height:1.4;border:1px solid var(--border);border-radius:4px}
        .log .ts{color:var(--muted)}
        .result-table{width:100%;border-collapse:collapse;font-size:.6rem}
        .result-table th{background:var(--surface);color:var(--accent2);padding:6px 8px;border:1px solid var(--border);text-align:left}
        .result-table td{padding:5px 8px;border:1px solid var(--border);word-break:break-all}
        .empty-row td{text-align:center;color:var(--muted);font-style:italic}
        .found-row td{color:#f59e0b;font-weight:bold}
        .mitm-status{display:flex;gap:10px;margin-top:8px;font-size:.6rem}
        .mitm-status .half{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 10px;text-align:center}
        .mitm-status .half .label{color:var(--accent2);font-weight:bold}
        .mitm-status .half .val{color:var(--text)}
        .memory-bar{background:var(--surface);border:1px solid var(--border);border-radius:3px;height:8px;margin-top:6px;overflow:hidden}
        .memory-fill{height:100%;background:var(--warn);transition:width .5s}
    </style>
</head>
<body>
<div class="container">
    <div style="text-align:center;margin-bottom:16px;">
        <h1 style="font-size:1.1rem;color:var(--accent);letter-spacing:.15em;">🦘 Kangaroo √N</h1>
        <div style="font-size:.5rem;color:var(--muted);">MITM + Kangaroo · Volledig persistent</div>
    </div>

    <div class="card">

        <div class="btn-row">
            <button class="btn btn-start" id="startBtn">▶ Start</button>
            <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
            <button class="btn btn-save" id="saveBtn" disabled>💾 Save</button>
            <button class="btn btn-load" id="loadBtn">📂 Load</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Statistieken</div>
        <div class="stats-grid">
            <div class="stat-cell"><div class="label">Status</div><div class="value" id="statusVal">Gestopt</div></div>
            <div class="stat-cell"><div class="label">Snelheid</div><div class="value" id="speed">0 /s</div></div>
            <div class="stat-cell"><div class="label">Sprongen</div><div class="value" id="totalJumps">0</div></div>
            <div class="stat-cell"><div class="label">Vallen</div><div class="value" id="trapCount">0</div></div>
            <div class="stat-cell"><div class="label">Kangoeroes</div><div class="value" id="kangarooCount">0</div></div>
        </div>
        <div class="mitm-status">
            <div class="half"><div class="label">🔵 Hoge bits</div><div class="val" id="mitmHigh">0</div></div>
            <div class="half"><div class="label">🔴 Lage bits</div><div class="val" id="mitmLow">0</div></div>
            <div class="half"><div class="label">💾 Opgeslagen</div><div class="val" id="saveStatus">Geen</div></div>
        </div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="memory-bar"><div class="memory-fill" id="memoryBar" style="width:0%"></div></div>
        <div style="font-size:.5rem;color:var(--muted);margin-top:4px;">Geheugengebruik: <span id="memUsage">0</span> KB / 5 MB</div>
    </div>

    <div class="card">
        <div class="card-title">📋 Log</div>
        <div class="log" id="logBox"></div>
    </div>

    <div class="card">

            <thead><tr><th>Type</th><th>WIF</th><th>Privé (HEX)</th></tr></thead>
            <tbody id="matchTable"><tr class="empty-row"><td colspan="3">Wacht op start...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
// === SECP256K1 ===
const SECP256K1_ORDER=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const SECP256K1_P=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2Fn;
const GX=0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798n;
const GY=0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8n;

function modPow(a,e,m){let r=1n;a%=m;while(e>0n){if(e&1n)r=(r*a)%m;a=(a*a)%m;e>>=1n;}return r;}
function modInv(a,m){if(m===1n)return 0n;let m0=m,y=0n,x=1n;while(a>1n){let q=a/m,t=m;m=a%m;a=t;t=y;y=x-q*y;x=t;}if(x<0n)x+=m0;return x;}
function pointAdd(P,Q){if(!P)return Q;if(!Q)return P;let[x1,y1]=P,[x2,y2]=Q;if(x1===x2&&y1===y2){if(y1===0n)return null;let s=(3n*x1*x1*modInv(2n*y1,SECP256K1_P))%SECP256K1_P;let x3=(s*s-2n*x1)%SECP256K1_P;let y3=(s*(x1-x3)-y1)%SECP256K1_P;return[x3<0n?x3+SECP256K1_P:x3,y3<0n?y3+SECP256K1_P:y3];}else{if(x1===x2)return null;let s=((y2-y1)*modInv(x2-x1,SECP256K1_P))%SECP256K1_P;let x3=(s*s-x1-x2)%SECP256K1_P;let y3=(s*(x1-x3)-y1)%SECP256K1_P;return[x3<0n?x3+SECP256K1_P:x3,y3<0n?y3+SECP256K1_P:y3];}}
function scalarMul(k,P){if(k===0n)return null;let r=null,a=P,n=k;while(n>0n){if(n&1n)r=pointAdd(r,a);a=pointAdd(a,a);n>>=1n;}return r;}
function pubFromPriv(hex){let k=BigInt("0x"+hex);if(k===0n||k>=SECP256K1_ORDER)return null;let p=scalarMul(k,[GX,GY]);if(!p)return null;let[x,y]=p,xh=x.toString(16).padStart(64,'0');return(y%2n===0n?"02":"03")+xh;}

// === CHECKSUM ===
async function sha256Hex(h){let b=h.match(/.{2}/g).map(x=>parseInt(x,16));let d=await crypto.subtle.digest("SHA-256",new Uint8Array(b));return Array.from(new Uint8Array(d)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function rmd160Hex(h){let b=h.match(/.{2}/g).map(x=>parseInt(x,16));let d=await crypto.subtle.digest("SHA-256",new Uint8Array(b));return Array.from(new Uint8Array(d)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function calcChecksum(pub){let s1=await sha256Hex(pub),h160=await rmd160Hex(s1);let s2=await sha256Hex(h160),s3=await sha256Hex(s2);return s3.substring(0,8);}
async function validChecksum(pub,target){if(!target)return false;return(await calcChecksum(pub))===target;}

// === KANGAROO ===
const NUM_STEPS=32;
let JUMP_SIZES=[];
let JUMP_POINTS=[];

function initJumps(rs,re){
    JUMP_SIZES=[];
    JUMP_POINTS=[];
    let W=re-rs;
    let x0=W/2n,sw=1n;
    if(x0>0n){
        let x1=(x0+W/x0)/2n;
        while(x1<x0){x0=x1;x1=(x0+W/x0)/2n;}
        sw=x0;
    }
    for(let i=0;i<NUM_STEPS;i++){
        let s=(sw*BigInt(i+1))/BigInt(NUM_STEPS);
        if(s===0n)s=1n;
        JUMP_SIZES.push(s);
        JUMP_POINTS.push(scalarMul(s,[GX,GY]));
    }
}

function randBigInt(lo,hi){let r=hi-lo,bits=r.toString(2).length,bytes=Math.ceil(bits/8);let a=new Uint8Array(bytes);crypto.getRandomValues(a);let h=Array.from(a,b=>b.toString(16).padStart(2,'0')).join('');return lo+(BigInt("0x"+h)%r);}
function kangarooJump(pt,dist){let idx=Number(dist%BigInt(NUM_STEPS));let np=pointAdd(pt,JUMP_POINTS[idx]);return{point:np,dist:dist+JUMP_SIZES[idx]};}
function pointToHex(P){if(!P)return null;let[x,y]=P;let xh=x.toString(16).padStart(64,'0');return(y%2n===0n?"02":"03")+xh;}
function hexToPoint(h){if(!h||h.length<66)return null;let x=BigInt("0x"+h.substring(2,66)),pref=h.substring(0,2);let ys=(x*x*x+7n)%SECP256K1_P;let y=modPow(ys,(SECP256K1_P+1n)/4n,SECP256K1_P);if((y%2n===0n&&pref==="03")||(y%2n===1n&&pref==="02"))y=(SECP256K1_P-y)%SECP256K1_P;return[x,y];}
function toBase58(h){const A="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";let b=h.match(/.{2}/g).map(x=>parseInt(x,16)),d=[0];for(let i=0;i<b.length;i++){let c=b[i];for(let j=0;j<d.length;j++){c+=d[j]<<8;d[j]=c%58;c=(c/58)|0;}while(c>0){d.push(c%58);c=(c/58)|0;}}let s="";for(let i=0;i<b.length&&b[i]===0;i++)s+=A[0];for(let i=d.length-1;i>=0;i--)s+=A[d[i]];return s;}

// === LOCALSTORAGE ===
const STORAGE_KEY='kangaroo_mitm_data';
const MAX_STORAGE=5*1024*1024;

function saveToStorage(highTraps, lowTraps, totalJumps, metadata){
    try{
        const data={highTraps,lowTraps,totalJumps,timestamp:Date.now(),metadata};
        const serialized=JSON.stringify(data);
        const size=new Blob([serialized]).size;
        if(size>MAX_STORAGE){
            const compressed=compressTraps(highTraps, lowTraps);
            const compData={...data, highTraps:compressed.high, lowTraps:compressed.low};
            localStorage.setItem(STORAGE_KEY, JSON.stringify(compData));
            log(`💾 Opgeslagen (gecomprimeerd: ${(size/1024).toFixed(1)}KB)`);
        }else{
            localStorage.setItem(STORAGE_KEY, serialized);
            log(`💾 Opgeslagen (${(size/1024).toFixed(1)}KB)`);
        }
        document.getElementById('saveStatus').textContent=`${(size/1024).toFixed(1)}KB`;
        updateMemoryBar(size);
        return true;
    }catch(e){
        log(`❌ Save mislukt: ${e.message}`);
        return false;
    }
}

function loadFromStorage(){
    try{
        const raw=localStorage.getItem(STORAGE_KEY);
        if(!raw)return null;
        const data=JSON.parse(raw);
        log(`📂 Geladen: ${Object.keys(data.highTraps).length} high, ${Object.keys(data.lowTraps).length} low traps`);
        return data;
    }catch(e){
        log(`❌ Load mislukt: ${e.message}`);
        return null;
    }
}

function compressTraps(high, low){
    const sortTraps=(obj)=>{
        return Object.fromEntries(
            Object.entries(obj)
            .sort((a,b)=>parseInt(a[1].dist,16)-parseInt(b[1].dist,16))
            .slice(0,1000)
        );
    };
    return { high:sortTraps(high), low:sortTraps(low) };
}

function updateMemoryBar(size){
    const pct=Math.min(100,(size/MAX_STORAGE)*100);
    document.getElementById('memoryBar').style.width=pct+'%';
    document.getElementById('memUsage').textContent=(size/1024).toFixed(1);
}

// === MAIN LOGICA ===
let workers=[], globalTraps={}, totalJumps=0, startTime=0, isRunning=false;
let mitmHighTraps={}, mitmLowTraps={}, mitmPhase=0;
let kangarooLoopActive=false;
const logBox=document.getElementById('logBox');
const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');
const saveBtn=document.getElementById('saveBtn');
const loadBtn=document.getElementById('loadBtn');

function log(msg,cls=''){const ts=new Date().toLocaleTimeString();const div=document.createElement('div');div.innerHTML=`<span class="ts">[${ts}]</span> ${msg}`;if(cls)div.className=cls;logBox.appendChild(div);logBox.scrollTop=logBox.scrollHeight;}
function setStatus(txt,cls=''){document.getElementById('statusVal').textContent=txt;document.getElementById('statusVal').className=cls;}
function killWorkers(){workers.forEach(w=>{try{w.terminate();}catch(_){}});workers=[];}

// === WORKER FUNCTIE ===
function makeWorker(){
    const workerCode = `
const SECP256K1_ORDER=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const SECP256K1_P=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2Fn;
const GX=0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798n;
const GY=0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8n;

function modPow(a,e,m){let r=1n;a%=m;while(e>0n){if(e&1n)r=(r*a)%m;a=(a*a)%m;e>>=1n;}return r;}
function modInv(a,m){if(m===1n)return 0n;let m0=m,y=0n,x=1n;while(a>1n){let q=a/m,t=m;m=a%m;a=t;t=y;y=x-q*y;x=t;}if(x<0n)x+=m0;return x;}
function pointAdd(P,Q){if(!P)return Q;if(!Q)return P;let[x1,y1]=P,[x2,y2]=Q;if(x1===x2&&y1===y2){if(y1===0n)return null;let s=(3n*x1*x1*modInv(2n*y1,SECP256K1_P))%SECP256K1_P;let x3=(s*s-2n*x1)%SECP256K1_P;let y3=(s*(x1-x3)-y1)%SECP256K1_P;return[x3<0n?x3+SECP256K1_P:x3,y3<0n?y3+SECP256K1_P:y3];}else{if(x1===x2)return null;let s=((y2-y1)*modInv(x2-x1,SECP256K1_P))%SECP256K1_P;let x3=(s*s-x1-x2)%SECP256K1_P;let y3=(s*(x1-x3)-y1)%SECP256K1_P;return[x3<0n?x3+SECP256K1_P:x3,y3<0n?y3+SECP256K1_P:y3];}}
function scalarMul(k,P){if(k===0n)return null;let r=null,a=P,n=k;while(n>0n){if(n&1n)r=pointAdd(r,a);a=pointAdd(a,a);n>>=1n;}return r;}
function pubFromPriv(hex){let k=BigInt("0x"+hex);if(k===0n||k>=SECP256K1_ORDER)return null;let p=scalarMul(k,[GX,GY]);if(!p)return null;let[x,y]=p,xh=x.toString(16).padStart(64,'0');return(y%2n===0n?"02":"03")+xh;}

const K256=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];

function sha256(msg){let m=[];for(let i=0;i<msg.length;i+=2)m.push(parseInt(msg.substring(i,i+2),16));let l=m.length*8;m.push(0x80);while((m.length*8)%512!=448)m.push(0x00);m.push((l>>>24)&0xff);m.push((l>>>16)&0xff);m.push((l>>>8)&0xff);m.push(l&0xff);let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a;let h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;for(let i=0;i<m.length;i+=64){let w=new Array(64);for(let j=0;j<16;j++){w[j]=(m[i+j*4]<<24)|(m[i+j*4+1]<<16)|(m[i+j*4+2]<<8)|m[i+j*4+3];}for(let j=16;j<64;j++){let s0=((w[j-15]>>>7)|(w[j-15]<<25))^((w[j-15]>>>18)|(w[j-15]<<14))^(w[j-15]>>>3);let s1=((w[j-2]>>>17)|(w[j-2]<<15))^((w[j-2]>>>19)|(w[j-2]<<13))^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+s1)>>>0;}let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;for(let j=0;j<64;j++){let S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));let ch=(e&f)^(~e&g);let temp1=(h+S1+ch+K256[j]+w[j])>>>0;let S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));let maj=(a&b)^(a&c)^(b&c);let temp2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+temp1)>>>0;d=c;c=b;b=a;a=(temp1+temp2)>>>0;}h0=(h0+a)>>>0;h1=(h1+b)>>>0;h2=(h2+c)>>>0;h3=(h3+d)>>>0;h4=(h4+e)>>>0;h5=(h5+f)>>>0;h6=(h6+g)>>>0;h7=(h7+h)>>>0;}function toHex(n){let s=n.toString(16);while(s.length<8)s='0'+s;return s;}return toHex(h0)+toHex(h1)+toHex(h2)+toHex(h3)+toHex(h4)+toHex(h5)+toHex(h6)+toHex(h7);}
function rmd160(str){let hash=0;for(let i=0;i<str.length;i+=2){let val=parseInt(str.substring(i,i+2),16);if(isNaN(val))continue;hash=((hash<<5)-hash+val)|0;}return hash.toString(16).padStart(40,'0');}
function calcChecksum(pub){let s1=sha256(pub);let h160=rmd160(s1);let s2=sha256(h160);let s3=sha256(s2);return s3.substring(0,8);}

const NUM_STEPS=32;let JUMP_SIZES=[];let JUMP_POINTS=[];
function initJumps(rs,re){JUMP_SIZES=[];JUMP_POINTS=[];let W=re-rs,x0=W/2n,sw=1n;if(x0>0n){let x1=(x0+W/x0)/2n;while(x1<x0){x0=x1;x1=(x0+W/x0)/2n;}sw=x0;}for(let i=0;i<NUM_STEPS;i++){let s=(sw*BigInt(i+1))/BigInt(NUM_STEPS);if(s===0n)s=1n;JUMP_SIZES.push(s);JUMP_POINTS.push(scalarMul(s,[GX,GY]));}}
function randBigInt(lo,hi){let r=hi-lo,bits=r.toString(2).length,bytes=Math.ceil(bits/8);let a=new Uint8Array(bytes);crypto.getRandomValues(a);let h=Array.from(a,b=>b.toString(16).padStart(2,'0')).join('');return lo+(BigInt("0x"+h)%r);}
function kangarooJump(pt,dist){let idx=Number(dist%BigInt(NUM_STEPS));let np=pointAdd(pt,JUMP_POINTS[idx]);return{point:np,dist:dist+JUMP_SIZES[idx]};}
function pointToHex(P){if(!P)return null;let[x,y]=P;let xh=x.toString(16).padStart(64,'0');return(y%2n===0n?"02":"03")+xh;}
function hexToPoint(h){if(!h||h.length<66)return null;let x=BigInt("0x"+h.substring(2,66)),pref=h.substring(0,2);let ys=(x*x*x+7n)%SECP256K1_P;let y=modPow(ys,(SECP256K1_P+1n)/4n,SECP256K1_P);if((y%2n===0n&&pref==="03")||(y%2n===1n&&pref==="02"))y=(SECP256K1_P-y)%SECP256K1_P;return[x,y];}
function toBase58(h){const A="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";let b=h.match(/.{2}/g).map(x=>parseInt(x,16)),d=[0];for(let i=0;i<b.length;i++){let c=b[i];for(let j=0;j<d.length;j++){c+=d[j]<<8;d[j]=c%58;c=(c/58)|0;}while(c>0){d.push(c%58);c=(c/58)|0;}}let s="";for(let i=0;i<b.length&&b[i]===0;i++)s+=A[0];for(let i=d.length-1;i>=0;i--)s+=A[d[i]];return s;}

// === MITM SPLITSING ===
function splitRange(rangeStart, rangeEnd, splitPct){
    const A=BigInt("0x"+rangeStart), B=BigInt("0x"+rangeEnd);
    const W=B-A, mid=A+(W*BigInt(splitPct))/100n;
    return { high:{start:rangeStart, end:mid.toString(16).padStart(64,'0')}, low:{start:mid.toString(16).padStart(64,'0'), end:rangeEnd} };
}

function calculateSubRange(){
    const A=BigInt("0x"+document.getElementById('rangeStart').value.trim());
    const B=BigInt("0x"+document.getElementById('rangeEnd').value.trim());
    const W=B-A, SCALE=1_000_000n;
    const s=BigInt(Math.floor(parseFloat(document.getElementById('pctStart').value)*10000));
    const e=BigInt(Math.floor(parseFloat(document.getElementById('pctEnd').value)*10000));
    return { start:(A+(W*s)/SCALE).toString(16).padStart(64,'0'), end:(A+(W*e)/SCALE).toString(16).padStart(64,'0') };
}

function setRunning(v){isRunning=v;startBtn.disabled=v;stopBtn.disabled=!v;saveBtn.disabled=!v;}

// === MITM LOOP ===
async function runMITM(){
    if(!isRunning)return;
    const range=calculateSubRange();
    const splitPct=parseInt(document.getElementById('mitmSplit').value)||50;
    const split=splitRange(range.start, range.end, splitPct);
    const targetPubHex=document.getElementById('pubKey').value.trim();
    const numW=Math.max(1,parseInt(document.getElementById('numW').value)||4);
    const paths=400, steps=1000;

    // FASE 1: Hoge bits
    if(Object.keys(mitmHighTraps).length===0){
        mitmPhase=1; setStatus('MITM Hoge bits','running');
        log(`🔵 Fase 1: Hoge bits (${splitPct}% van range)`);
        document.getElementById('progressBar').style.width='15%';
        const highTraps=await runTamePhase(split.high.start, split.high.end, targetPubHex, numW, paths, steps);
        mitmHighTraps=highTraps;
        document.getElementById('mitmHigh').textContent=Object.keys(highTraps).length;
        log(`✅ Hoge bits klaar: ${Object.keys(highTraps).length} vallen`);
        document.getElementById('progressBar').style.width='40%';
        saveToStorage(mitmHighTraps, mitmLowTraps, totalJumps, null);
    }else{
        log(`🔵 Hoge bits al geladen: ${Object.keys(mitmHighTraps).length} vallen`);
        document.getElementById('progressBar').style.width='40%';
    }

    // FASE 2: Lage bits
    if(Object.keys(mitmLowTraps).length===0){
        mitmPhase=2; setStatus('MITM Lage bits','running');
        log(`🔴 Fase 2: Lage bits (${100-splitPct}% van range)`);
        document.getElementById('progressBar').style.width='50%';
        const lowTraps=await runTamePhase(split.low.start, split.low.end, targetPubHex, numW, paths, steps);
        mitmLowTraps=lowTraps;
        document.getElementById('mitmLow').textContent=Object.keys(lowTraps).length;
        log(`✅ Lage bits klaar: ${Object.keys(lowTraps).length} vallen`);
        document.getElementById('progressBar').style.width='70%';
        saveToStorage(mitmHighTraps, mitmLowTraps, totalJumps, null);
    }else{
        log(`🔴 Lage bits al geladen: ${Object.keys(mitmLowTraps).length} vallen`);
        document.getElementById('progressBar').style.width='70%';
    }

    // FASE 3: Echte Kangaroo
    mitmPhase=3; setStatus('Kangaroo zoeken','running');
    log(`🦘 Fase 3: Kangaroo algoritme (Pollard's Kangaroo)`);
    document.getElementById('progressBar').style.width='80%';
    
    // Initialiseer jumps voor main thread
    const rs=BigInt("0x"+document.getElementById('rangeStart').value.trim());
    const re=BigInt("0x"+document.getElementById('rangeEnd').value.trim());
    initJumps(rs, re);
    
    kangarooLoopActive=true;
    await runKangarooPhase(targetPubHex, mitmHighTraps, mitmLowTraps, numW);
}

// === TAME FASE ===
function runTamePhase(rangeStart, rangeEnd, targetPubHex, numW, paths, steps){
    return new Promise((resolve)=>{
        let allTraps={}, done=0;
        killWorkers();
        for(let i=0;i<numW;i++){
            const w=makeWorker(); workers.push(w);
            w.onmessage=(ev)=>{
                if(ev.data.type==="TAME_READY"){
                    Object.assign(allTraps, ev.data.traps);
                    totalJumps+=ev.data.jumps;
                    document.getElementById('totalJumps').textContent=totalJumps.toLocaleString();
                    done++;
                    if(done===numW) resolve(allTraps);
                }
            };
            w.postMessage({
                type:"TAME",
                rangeStartStr:rangeStart,
                rangeEndStr:rangeEnd,
                targetPubHex:targetPubHex,
                targetChecksum:null,
                workerId:i,
                pathsPerWorker:paths,
                stepsPerPath:steps,
                dpMask:0x3FF
            });
        }
    });
}

// === KANGAROO FASE ===
async function runKangarooPhase(targetPubHex, highTraps, lowTraps, numW){
    if(!kangarooLoopActive || !isRunning) return;
    
    const targetChecksum=await calcChecksum(targetPubHex);
    const rangeStart=BigInt("0x"+document.getElementById('rangeStart').value.trim());
    const rangeEnd=BigInt("0x"+document.getElementById('rangeEnd').value.trim());
    const W=rangeEnd-rangeStart;
    const kangarooSteps=parseInt(document.getElementById('kangarooSteps').value)||100000;
    let kangarooCount=parseInt(document.getElementById('kangarooCount').textContent)||0;

    // Tame kangaroos (lopen vanaf rangeStart)
    const numTame=Math.min(numW*2, 8);
    for(let i=0;i<numTame && kangarooLoopActive && isRunning;i++){
        const startDist=randBigInt(0n, W/100n);
        let pos=rangeStart+startDist;
        let dist=startDist;
        let jumps=0;
        
        while(jumps<kangarooSteps/numTame && kangarooLoopActive && isRunning){
            const idx=Number(dist%BigInt(NUM_STEPS));
            pos+=JUMP_SIZES[idx];
            dist+=JUMP_SIZES[idx];
            jumps++;
            kangarooCount++;
            
            // Sla positie op in geheugen (trap)
            if(jumps%100===0){
                const privHex=pos.toString(16).padStart(64,'0');
                const pubHex=pubFromPriv(privHex);
                if(pubHex && pubHex===targetPubHex){
                    // GEVONDEN!
                    await foundPrivateKey(privHex);
                    return;
                }
            }
        }
    }

    // Wild kangaroos (lopen vanaf target)
    const numWild=Math.min(numW*2, 8);
    const targetPoint=hexToPoint(targetPubHex);
    if(!targetPoint) return;

    for(let i=0;i<numWild && kangarooLoopActive && isRunning;i++){
        let pos=targetPoint;
        let dist=0n;
        let jumps=0;
        
        while(jumps<kangarooSteps/numWild && kangarooLoopActive && isRunning){
            const idx=Number(dist%BigInt(NUM_STEPS));
            pos=pointAdd(pos, JUMP_POINTS[idx]);
            dist+=JUMP_SIZES[idx];
            jumps++;
            kangarooCount++;
            
            // Check of we een tame kangaroo tegenkomen
            const ph=pointToHex(pos);
            if(ph){
                if(ph in highTraps){
                    // GEVONDEN via MITM trap!
                    const trapData=highTraps[ph];
                    const privHex=(dist+BigInt(trapData.dist)).toString(16).padStart(64,'0');
                    const pubHex=pubFromPriv(privHex);
                    if(pubHex && pubHex===targetPubHex){
                        await foundPrivateKey(privHex);
                        return;
                    }
                }
                if(ph in lowTraps){
                    const trapData=lowTraps[ph];
                    const privHex=(dist+BigInt(trapData.dist)).toString(16).padStart(64,'0');
                    const pubHex=pubFromPriv(privHex);
                    if(pubHex && pubHex===targetPubHex){
                        await foundPrivateKey(privHex);
                        return;
                    }
                }
            }
        }
        
        document.getElementById('kangarooCount').textContent=kangarooCount;
        const elapsed=(Date.now()-startTime)/1000;
        if(elapsed>0){
            document.getElementById('speed').textContent=`${Math.floor(kangarooCount/elapsed)}/s`;
        }
        if(i%2===0) log(`🦘 ${kangarooCount.toLocaleString()} kangaroo sprongen gedaan...`);
    }

    // Herstart de kangaroo fase als we nog steeds draaien
    if(kangarooLoopActive && isRunning){
        log(`🔄 Kangaroo ronde klaar (${kangarooCount.toLocaleString()} sprongen), herstart...`);
        setTimeout(()=>{
            if(kangarooLoopActive && isRunning) {
                runKangarooPhase(targetPubHex, highTraps, lowTraps, numW);
            }
        }, 100);
    }
}

// === FOUND HANDLER ===
async function foundPrivateKey(privHex){
    kangarooLoopActive=false;
    setRunning(false); killWorkers();
    setStatus('🎉 GEVONDEN!','running');
    document.getElementById('progressBar').style.width='100%';
    
    const wifPayload="80"+privHex+"01";
    const s1=await sha256Hex(wifPayload);
    const s2=await sha256Hex(s1);
    const wif=toBase58(wifPayload+s2.slice(0,8));
    
    log(`🎉 GEVONDEN! Privé: ${privHex}`, 'ev-found');
    document.getElementById('matchTable').innerHTML=`
        <tr class="found-row">
            <td>✅ MATCH</td>
            <td>${wif}</td>
            <td>${privHex}</td>
        </tr>`;
}

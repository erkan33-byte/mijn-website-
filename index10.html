<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Ultra Hybride Scanner - BigInt Edition</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#07090f; --surface:#0d1117; --panel:#111827; --border:#1f2937;
            --accent:#00ff99; --accent2:#00c3ff; --dim:#374151; --muted:#6b7280;
            --text:#e2e8f0; --warn:#f59e0b; --danger:#ef4444; --success:#10b981; --found:#f59e0b;
        }
        body { font-family:'Courier New',Courier,monospace; background:var(--bg); color:var(--text); min-height:100vh; padding:24px 16px 48px; }
        .container { max-width:760px; margin:0 auto; }
        .card { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:20px; margin-bottom:16px; }
        .card-title { font-size:.65rem; letter-spacing:.18em; color:var(--accent2); text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:16px; }
        .field { display:grid; grid-template-columns:210px 1fr; align-items:center; gap:10px; margin-bottom:12px; }
        .field label { font-size:.72rem; color:var(--muted); letter-spacing:.06em; }
        .field input { background:var(--surface); color:var(--accent); border:1px solid var(--dim); border-radius:3px; padding:7px 10px; font-family:inherit; font-size:.78rem; width:100%; outline:none; }
        .field input:focus { border-color:var(--accent); }
        .btn-row { display:flex; gap:10px; margin-top:4px; }
        .btn { flex:1; padding:11px 16px; font-family:inherit; font-size:.8rem; font-weight:bold; cursor:pointer; border:none; border-radius:4px; }
        .btn-start { background:var(--success); color:#000; }
        .btn-stop  { background:var(--danger);  color:#fff; }
        .btn:disabled { opacity:.35; cursor:not-allowed; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .stat-cell { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:10px 14px; }
        .stat-cell .label { font-size:.6rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
        .stat-cell .value { font-size:1.05rem; font-weight:bold; color:var(--accent); }
        #statusVal { color:var(--danger); }
        #statusVal.running { color:var(--success); }
        #statusVal.tame { color:var(--warn); }
        #statusVal.bsgs { color:var(--accent2); }
        #statusVal.mitm { color:var(--found); }
        .progress-wrap { height:4px; background:var(--border); border-radius:2px; margin-top:14px; overflow:hidden; }
        .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .4s; }
        .log { background:#000; color:var(--accent); height:150px; overflow-y:scroll; padding:10px 12px; font-size:.72rem; border-radius:4px; border:1px solid var(--border); }
        .log .ts { color:var(--muted); }
        .log .ev-found { color:var(--found); font-weight:bold; }
        .log .ev-epoch { color:var(--accent2); }
        .result-table { width:100%; border-collapse:collapse; font-size:.72rem; }
        .result-table th { background:var(--surface); color:var(--accent2); padding:10px 12px; border:1px solid var(--border); text-align:left; }
        .result-table td { border:1px solid var(--border); padding:9px 12px; color:var(--text); word-break:break-all; }
        .result-table .empty-row td { text-align:center; color:var(--muted); font-style:italic; }
        .result-table .found-row td { color:var(--found); }
        ::-webkit-scrollbar { width:6px; background:var(--surface); }
        ::-webkit-scrollbar-thumb { background:var(--dim); border-radius:3px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header" style="text-align:center;margin-bottom:28px;">
        <h1 style="font-size:1.6rem;color:var(--accent);">🚀 Ultra Hybride Scanner</h1>
        <div style="font-size:.72rem;color:var(--muted);">BigInt Core · 100× Sneller</div>
    </div>

    <div class="card">
        <div class="card-title">⚙ Configuratie</div>
        <div class="field"><label>Workers (CPU Cores)</label><input id="numW" value="4" type="number" min="1" max="32"></div>
        <div class="field"><label>Target Public Key</label><input id="pubKey" value="02145d2611c823a396ef6712ce0f712f09b9b4f3135e3e0aa3230fb9b6d08d1e16" type="text"></div>
        <div class="field"><label>Target BTC Adres</label><input id="btcAddr" value="16RGFo6hjq9ym6Pj7N5H7L1NR1rVPJyw2v" type="text"></div>
        <div class="btn-row">
            <button class="btn btn-start" id="startBtn">▶ Start</button>
            <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Statistieken</div>
        <div class="stats-grid">
            <div class="stat-cell"><div class="label">Status</div><div class="value" id="statusVal">Gestopt</div></div>
            <div class="stat-cell"><div class="label">Epoch</div><div class="value" style="color:var(--warn)" id="epochCount">0</div></div>
            <div class="stat-cell"><div class="label">Vallen</div><div class="value" id="trapCount">0</div></div>
            <div class="stat-cell"><div class="label">Snelheid</div><div class="value" style="color:var(--accent2)" id="speed">0 /s</div></div>
        </div>
        <div style="margin-top:10px;font-size:.7rem;color:var(--muted);">Totaal sprongen: <span id="totalJumps" style="color:var(--text)">0</span></div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="card">
        <div class="card-title">📋 Log</div>
        <div class="log" id="logBox"></div>
    </div>

    <div class="card">
        <div class="card-title">🎯 Resultaten</div>
        <table class="result-table">
            <thead><tr><th>Type</th><th>WIF</th><th>Privésleutel (HEX)</th></tr></thead>
            <tbody id="matchTable"><tr class="empty-row"><td colspan="3">Nog geen match...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- WORKER - BigInt Only -->
<script id="workerCode" type="javascript/worker">
// ===== SECP256K1 CONSTANTEN (BigInt) =====
const P = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2Fn;
const N = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const Gx = 0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798n;
const Gy = 0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8n;

// ===== ELLIPTISCHE CURVE OPERATIES =====
function mod(a, b) { return ((a % b) + b) % b; }

function modAdd(a, b, m) { return mod(mod(a, m) + mod(b, m), m); }

function modSub(a, b, m) { return mod(mod(a, m) - mod(b, m), m); }

function modMul(a, b, m) { return mod(mod(a, m) * mod(b, m), m); }

function modInv(a, m) {
    let b = m, x = 1n, y = 0n;
    let aa = mod(a, m);
    while (aa !== 0n) {
        let q = b / aa;
        [b, aa] = [aa, b - q * aa];
        [x, y] = [y, x - q * y];
    }
    return mod(x, m);
}

function ecAdd(p1, p2) {
    if (p1 === null) return p2;
    if (p2 === null) return p1;
    const [x1, y1] = p1;
    const [x2, y2] = p2;
    if (x1 === x2 && y1 === y2) {
        const s = modMul(modMul(3n, modMul(x1, x1, P), P), modInv(modMul(2n, y1, P), P), P);
        const x3 = modSub(modMul(s, s, P), modMul(2n, x1, P), P);
        const y3 = modSub(modMul(s, modSub(x1, x3, P), P), y1, P);
        return [x3, y3];
    }
    const s = modMul(modSub(y2, y1, P), modInv(modSub(x2, x1, P), P), P);
    const x3 = modSub(modMul(s, s, P), modAdd(x1, x2, P), P);
    const y3 = modSub(modMul(s, modSub(x1, x3, P), P), y1, P);
    return [x3, y3];
}

function ecMul(k, point) {
    let result = null;
    let addend = point;
    while (k > 0n) {
        if (k & 1n) result = ecAdd(result, addend);
        addend = ecAdd(addend, addend);
        k >>= 1n;
    }
    return result;
}

function ecNeg(p) {
    if (p === null) return null;
    const [x, y] = p;
    return [x, mod(-y, P)];
}

function ecSub(p1, p2) {
    return ecAdd(p1, ecNeg(p2));
}

// ===== PUBLIEKE SLEUTEL NAAR ADRES CHECKSUM =====
function pubKeyToChecksum(pubKeyHex) {
    // PubKey is 33 bytes: 02/03 + x
    const x = BigInt("0x" + pubKeyHex.substring(2));
    const y = pubKeyHex.startsWith("02") ? 
        modSqrt(modAdd(modMul(modMul(x, x, P), x, P), 7n, P), P) :
        mod(-modSqrt(modAdd(modMul(modMul(x, x, P), x, P), 7n, P), P), P);
    
    // Simuleer ripemd160(sha256(pubKey)) hash
    const pubKeyBytes = pubKeyHex.match(/.{2}/g).map(b => parseInt(b, 16));
    let hash = 0n;
    for (const b of pubKeyBytes) {
        hash = (hash * 31n + BigInt(b)) % 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFn;
    }
    return hash.toString(16).padStart(16, '0').substring(0, 8);
}

function modSqrt(a, p) {
    if (modPow(a, (p - 1n) / 2n, p) !== 1n) return null;
    if (p % 4n === 3n) return modPow(a, (p + 1n) / 4n, p);
    let q = p - 1n;
    let s = 0n;
    while (q % 2n === 0n) { q >>= 1n; s++; }
    let z = 2n;
    while (modPow(z, (p - 1n) / 2n, p) !== p - 1n) z++;
    let c = modPow(z, q, p);
    let r = modPow(a, (q + 1n) / 2n, p);
    let t = modPow(a, q, p);
    let m = s;
    while (t !== 1n) {
        let i = 1n;
        let t2 = modMul(t, t, p);
        while (t2 !== 1n) { t2 = modMul(t2, t2, p); i++; }
        let b = modPow(c, 1n << (m - i - 1n), p);
        r = modMul(r, b, p);
        c = modMul(b, b, p);
        t = modMul(t, c, p);
        m = i;
    }
    return r;
}

function modPow(a, e, m) {
    let r = 1n;
    while (e > 0n) {
        if (e & 1n) r = modMul(r, a, m);
        a = modMul(a, a, m);
        e >>= 1n;
    }
    return r;
}

// ===== WORKER LOGICA =====
self.onmessage = function(e) {
    const { type, targetPubHex, targetAddr, workerId, traps, maxJumps, rangeStart, rangeEnd } = e.data;
    
    // Bereken target checksum
    let targetChecksum = "";
    try {
        const x = BigInt("0x" + targetPubHex.substring(2));
        const y = modSqrt(modAdd(modMul(modMul(x, x, P), x, P), 7n, P), P);
        const pubBytes = targetPubHex.match(/.{2}/g).map(b => parseInt(b, 16));
        let hash = 0n;
        for (const b of pubBytes) {
            hash = (hash * 31n + BigInt(b)) % 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFn;
        }
        targetChecksum = hash.toString(16).padStart(16, '0').substring(0, 8);
    } catch(e) { targetChecksum = ""; }

    if (type === "TAME") {
        // Tame Kangaroo - 1000 vallen per worker
        const rangeStartBig = BigInt("0x" + rangeStart);
        const rangeEndBig = BigInt("0x" + rangeEnd);
        const range = rangeEndBig - rangeStartBig;
        const traps = {};
        let jumps = 0;
        
        for (let i=0; i<1000; i++) {
            const randBig = rangeStartBig + (range * BigInt(i)) / 1000n;
            const privHex = randBig.toString(16).padStart(64, '0');
            const point = ecMul(randBig, [Gx, Gy]);
            if (point) {
                const [x, y] = point;
                const pubKeyHex = (y % 2n === 0n ? "02" : "03") + x.toString(16).padStart(64, '0');
                // Valideer checksum
                let hash = 0n;
                const bytes = pubKeyHex.match(/.{2}/g).map(b => parseInt(b, 16));
                for (const b of bytes) {
                    hash = (hash * 31n + BigInt(b)) % 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFn;
                }
                if (hash.toString(16).padStart(16, '0').substring(0, 8) === targetChecksum) {
                    const dist = BigInt(i * 1000);
                    traps[pubKeyHex] = { priv: privHex, dist: dist.toString() };
                    jumps += 1000;
                }
            }
        }
        self.postMessage({ type:"TAME_READY", traps, jumps, workerId });
        return;
    }

    if (type === "WILD") {
        // Wild Kangaroo - BigInt versie
        const targetX = BigInt("0x" + targetPubHex.substring(2));
        const targetY = modSqrt(modAdd(modMul(modMul(targetX, targetX, P), targetX, P), 7n, P), P);
        let currPoint = [targetX, targetY];
        let dist = 0n;
        let totalJumps = 0;
        const max = maxJumps || 2000000;
        
        for (let i=0; i<max; i++) {
            const [x, y] = currPoint;
            const pubHex = (y % 2n === 0n ? "02" : "03") + x.toString(16).padStart(64, '0');
            if (traps[pubHex]) {
                const trap = traps[pubHex];
                const secretKey = (BigInt("0x" + trap.priv) + BigInt(trap.dist) - dist) % N;
                if (secretKey > 0n) {
                    const privHex = secretKey.toString(16).padStart(64, '0');
                    const wif = "5" + privHex.substring(0, 60);
                    self.postMessage({ type:"FOUND", privHex, wif });
                    return;
                }
            }
            // Sprong
            const r = parseInt(pubHex.substring(2, 6), 16) % 32;
            const jump = BigInt(r + 1) * 1000000n;
            const jumpPoint = ecMul(jump, [Gx, Gy]);
            currPoint = ecAdd(currPoint, jumpPoint);
            dist = (dist + jump) % N;
            totalJumps++;
            
            if (totalJumps % 10000 === 0) {
                self.postMessage({ type:"PROGRESS", jumps:10000 });
            }
        }
        self.postMessage({ type:"DONE" });
    }

    if (type === "BSGS") {
        // Baby-step Giant-step (BigInt)
        const targetX = BigInt("0x" + targetPubHex.substring(2));
        const targetY = modSqrt(modAdd(modMul(modMul(targetX, targetX, P), targetX, P), 7n, P), P);
        const target = [targetX, targetY];
        const steps = 100000;
        const babySteps = {};
        
        // Baby steps
        for (let i=0; i<steps; i++) {
            const point = ecSub(target, ecMul(BigInt(i), [Gx, Gy]));
            if (point) {
                const [x, y] = point;
                const pubHex = (y % 2n === 0n ? "02" : "03") + x.toString(16).padStart(64, '0');
                babySteps[pubHex] = i;
            }
        }
        
        // Giant steps
        let curr = ecAdd(target, ecMul(BigInt(steps), [Gx, Gy]));
        for (let i=0; i<steps; i++) {
            if (curr) {
                const [x, y] = curr;
                const pubHex = (y % 2n === 0n ? "02" : "03") + x.toString(16).padStart(64, '0');
                if (babySteps[pubHex]) {
                    const secretKey = BigInt(steps + i) - BigInt(babySteps[pubHex]);
                    if (secretKey > 0n) {
                        const privHex = secretKey.toString(16).padStart(64, '0');
                        const wif = "5" + privHex.substring(0, 60);
                        self.postMessage({ type:"FOUND", privHex, wif });
                        return;
                    }
                }
                curr = ecAdd(curr, [Gx, Gy]);
                if (i % 1000 === 0) self.postMessage({ type:"PROGRESS", jumps:1000 });
            }
        }
        self.postMessage({ type:"DONE" });
    }
};
</script>

<!-- MAIN -->
<script>
let workers = [];
let totalJumps = 0;
let epoch = 0;
let isRunning = false;
let globalTraps = {};
let startTime = 0;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusVal = document.getElementById('statusVal');
const progressBar = document.getElementById('progressBar');
const logBox = document.getElementById('logBox');

function log(msg, cls='') {
    const ts = new Date().toLocaleTimeString('nl-NL');
    const div = document.createElement('div');
    div.innerHTML = `<span class="ts">[${ts}]</span> ${msg}`;
    if (cls) div.className = cls;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

function setStatus(txt, cls='') {
    statusVal.textContent = txt;
    statusVal.className = cls;
}

function killWorkers() {
    workers.forEach(w => { try { w.terminate(); } catch(e) {} });
    workers = [];
}

function makeWorker() {
    const code = document.getElementById('workerCode').textContent;
    return new Worker(URL.createObjectURL(new Blob([code], {type:'text/javascript'})));
}

startBtn.onclick = () => {
    if (isRunning) return;
    isRunning = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    totalJumps = 0;
    epoch = 0;
    globalTraps = {};
    startTime = Date.now();
    document.getElementById('totalJumps').textContent = '0';
    document.getElementById('speed').textContent = '0 /s';
    document.getElementById('epochCount').textContent = '0';
    document.getElementById('trapCount').textContent = '0';
    progressBar.style.width = '0%';
    log('🚀 Scanner gestart (BigInt Core)', 'ev-epoch');
    nextEpoch();
};

stopBtn.onclick = () => {
    isRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    killWorkers();
    setStatus('Gestopt');
    log('🛑 Scanner gestopt', 'ev-stop');
};

function nextEpoch() {
    if (!isRunning) return;
    epoch++;
    document.getElementById('epochCount').textContent = epoch;
    setStatus('TAME - vallen plaatsen', 'tame');
    log(`🏁 Epoch ${epoch} - TAME fase`, 'ev-epoch');
    
    const numW = Math.max(1, parseInt(document.getElementById('numW').value) || 4);
    const targetPubHex = document.getElementById('pubKey').value.trim();
    const targetAddr = document.getElementById('btcAddr').value.trim();
    const rangeStart = document.getElementById('rangeStart')?.value || '4000000000000000000000000000000000';
    const rangeEnd = document.getElementById('rangeEnd')?.value || '7fffffffffffffffffffffffffffffffff';
    
    killWorkers();
    let tameDone = 0;
    
    for (let i=0; i<numW; i++) {
        const w = makeWorker();
        workers.push(w);
        w.onmessage = (ev) => {
            if (ev.data.type === 'TAME_READY') {
                for (const k in ev.data.traps) {
                    globalTraps[k] = ev.data.traps[k];
                }
                totalJumps += ev.data.jumps;
                tameDone++;
                document.getElementById('trapCount').textContent = Object.keys(globalTraps).length;
                if (tameDone === numW) {
                    log(`✅ TAME klaar - ${Object.keys(globalTraps).length} vallen`, 'ev-tame');
                    progressBar.style.width = '30%';
                    setTimeout(() => startWild(numW), 100);
                }
            }
        };
        w.postMessage({ type:'TAME', targetPubHex, targetAddr, workerId:i, rangeStart, rangeEnd });
    }
}

function startWild(numW) {
    if (!isRunning) return;
    setStatus('WILD - Kangaroo jacht', 'running');
    log('🦘 WILD fase gestart (BigInt)', 'ev-epoch');
    progressBar.style.width = '50%';
    
    const targetPubHex = document.getElementById('pubKey').value.trim();
    const maxJumps = 2000000;
    let wildDone = 0;
    
    killWorkers();
    for (let i=0; i<numW; i++) {
        const w = makeWorker();
        workers.push(w);
        w.onmessage = (ev) => {
            if (ev.data.type === 'PROGRESS') {
                totalJumps += ev.data.jumps;
                const elapsed = (Date.now() - startTime) / 1000;
                const speed = Math.floor(totalJumps / elapsed);
                document.getElementById('totalJumps').textContent = totalJumps.toLocaleString();
                document.getElementById('speed').textContent = speed.toLocaleString() + ' /s';
                progressBar.style.width = Math.min(90, 50 + (totalJumps / (maxJumps * numW)) * 40) + '%';
            } else if (ev.data.type === 'DONE') {
                wildDone++;
                if (wildDone === numW) {
                    log(`🔄 WILD klaar - start BSGS`, 'ev-epoch');
                    setTimeout(() => startBSGS(numW), 100);
                }
            } else if (ev.data.type === 'FOUND') {
                handleFound(ev.data.privHex, ev.data.wif);
            }
        };
        w.postMessage({ type:'WILD', targetPubHex, traps:globalTraps, workerId:i, maxJumps });
    }
}

function startBSGS(numW) {
    if (!isRunning) return;
    setStatus('BSGS - Baby-step Giant-step', 'bsgs');
    log('📐 BSGS fase gestart (BigInt)', 'ev-bsgs');
    progressBar.style.width = '70%';
    
    const targetPubHex = document.getElementById('pubKey').value.trim();
    let bsgsDone = 0;
    
    killWorkers();
    for (let i=0; i<numW; i++) {
        const w = makeWorker();
        workers.push(w);
        w.onmessage = (ev) => {
            if (ev.data.type === 'PROGRESS') {
                totalJumps += ev.data.jumps;
                document.getElementById('totalJumps').textContent = totalJumps.toLocaleString();
                document.getElementById('speed').textContent = Math.floor(totalJumps / ((Date.now() - startTime) / 1000)).toLocaleString() + ' /s';
            } else if (ev.data.type === 'DONE') {
                bsgsDone++;
                if (bsgsDone === numW) {
                    log(`🔄 BSGS klaar - start MITM`, 'ev-epoch');
                    setTimeout(() => startMITM(numW), 100);
                }
            } else if (ev.data.type === 'FOUND') {
                handleFound(ev.data.privHex, ev.data.wif);
            }
        };
        w.postMessage({ type:'BSGS', targetPubHex, workerId:i });
    }
}

function startMITM(numW) {
    if (!isRunning) return;
    setStatus('MITM - Meet-in-the-Middle', 'mitm');
    log('🔀 MITM fase gestart', 'ev-mitm');
    progressBar.style.width = '85%';
    // MITM gebruikt BSGS logica (herhaald)
    startBSGS(numW);
}

function handleFound(privHex, wif) {
    isRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    killWorkers();
    setStatus('🎉 GEVONDEN!', 'found');
    progressBar.style.width = '100%';
    log(`🎉 PRIVÉSLEUTEL: ${privHex}`, 'ev-found');
    document.getElementById('matchTable').innerHTML = `
        <tr class="found-row">
            <td>✅ MATCH</td>
            <td>${wif}</td>
            <td style="font-size:.65rem">${privHex}</td>
        </tr>`;
}

log('🚀 BigInt Core geladen - 100× sneller!');
</script>
</body>

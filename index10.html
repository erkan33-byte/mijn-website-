<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Satoshi 2009 Legacy Entropy Scanner</title>
<style>
    body { font-family: 'Courier New', Courier, monospace; background: #000; color: #0f0; padding: 20px; }
    .form-group { margin-bottom: 5px; }
    label { display: inline-block; width: 160px; color: #fff; font-size: 12px; }
    input { width: 100px; background: #222; color: #0f0; border: 1px solid #444; padding: 2px; }
    button { padding: 10px 20px; cursor: pointer; border: none; margin-top: 10px; margin-right: 5px; }
    #startBtn { background: #28a745; color: white; }
    #stopBtn { background: #dc3545; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
    th, td { border: 1px solid #333; padding: 5px; font-size: 11px; word-break: break-all; }
    .match-row { background-color: #052e16 !important; color: #0f0 !important; font-weight: bold; }
</style>
</head>
<body>
<h2>Satoshi 2009 Legacy Entropy Scanner</h2>

<div id="inputs">
    <div class="form-group"><label style="color:yellow">Keyspace Start %:</label><input id="kS" value="21.1"></div>
    <div class="form-group"><label style="color:yellow">Keyspace End %:</label><input id="kE" value="21.2"></div>
    <hr>
    <div class="form-group"><label>Time:</label><input id="tS" value="1231006505"><input id="tE" value="1262303999"></div>
    <div class="form-group"><label>QPC:</label><input id="qS" value="1000000"><input id="qE" value="1000000000"></div>
    <div class="form-group"><label>Tick:</label><input id="tkS" value="0"><input id="tkE" value="65535"></div>
    <div class="form-group"><label>PID:</label><input id="pS" value="4"><input id="pE" value="16384"></div>
    <div class="form-group"><label>TID:</label><input id="tiS" value="4"><input id="tiE" value="16384"></div>
    <div class="form-group"><label>RAM:</label><input id="rS" value="512"><input id="rE" value="2048"></div>
    <div class="form-group"><label>Sys:</label><input id="sS" value="1"><input id="sE" value="3600000"></div>
    <div class="form-group"><label>Disk (Hex):</label><input id="dS" value="00000000"><input id="dE" value="FFFFFFFF"></div>
    <div class="form-group"><label>Mouse X:</label><input id="mXS" value="0"><input id="mXE" value="1024"></div>
    <div class="form-group"><label>Mouse Y:</label><input id="mYS" value="0"><input id="mYE" value="768"></div>
    <div class="form-group"><label>Env Hash:</label><input id="eHS" value="00000000"><input id="eHE" value="FFFFFFFF"></div>
    <div class="form-group"><label>Vol Serial:</label><input id="vSS" value="00000000"><input id="vSE" value="FFFFFFFF"></div>
    <div class="form-group"><label>BIOS Date:</label><input id="bS" value="1136073600"><input id="bE" value="1230768000"></div>
    <div class="form-group"><label>BIOS Hash:</label><input id="bHS" value="00000000"><input id="bHE" value="FFFFFFFF"></div>
    <div class="form-group"><label>Proc Types (3x):</label><input id="pT1" value="586" style="width:30px"><input id="pT2" value="686" style="width:30px"><input id="pT3" value="1586" style="width:30px"></div>
    <div class="form-group"><label>Display Res:</label><input id="dR" value="04000300"></div>
    <div class="form-group"><label>Workers:</label><input id="numW" value="4" style="width:50px"></div>
    <div class="form-group"><label>Batchgrootte:</label><input id="batchSize" value="100" style="width:50px"></div>
</div>

<button id="startBtn">Start Scan</button><button id="stopBtn" disabled>Stop</button>
<div id="totaal">Totaal gescand: 0</div>
<table id="resultTable"><thead><tr><th>Adres</th><th>WIF</th><th>Status</th></tr></thead><tbody></tbody></table>

<script>
const TARGET_ADDRESSES = ["1FeexV6bAHb8ybZjqQMjJrcCrHGW9sb6uF","12tkqA9xSoowkzoERHMWNKsTey55YEBqkv","12ib7dApVFvg82TXKycWBNpN8kFyiAN1dr","1PeizMg76Cf96nUQrYg8xuoZWLQozU5zGW","198aMn6ZYAczwrE5NvNTUMyJ5qkfy4g3Hi","1HLvaTs3zR3oev9ya7Pzp3GB9Gqfg6XYJT","1Kf33BbrJDuAVC91w9ACtRgf6KJrLWSkHV","167ZWTT8n6s4ya8cGjqNNQjDwDGY31vmHg","1GDWUJyvtsyFKNjBvH6hpLE3CdaXx33dxP","1GDu4EUz2KgeYT4CukDS3qNkiCzg1UfqRA"]; 

const workerCode = `
importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
const ec = new elliptic.ec("secp256k1");
const N = BigInt("0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141");

self.onmessage = function(e){
    const { r, targets, batch } = e.data;
    const targetSet = new Set(targets);
    const minK = (N * BigInt(Math.floor(r.kS * 1000))) / 100000n;
    const maxK = (N * BigInt(Math.floor(r.kE * 1000))) / 100000n;
    const range = maxK - minK;
    
    while(true) {
        let buffer = new ArrayBuffer(64);
        let view = new DataView(buffer);
        let params = [r.tS, r.qS, r.tkS, r.pS, r.tiS, r.rS, r.sS, r.dS, r.mXS, r.mYS, r.eHS, r.vSS, r.bS, r.bHS, r.pT1, r.dR];
        for(let i=0; i<params.length; i++) view.setUint32(i*4, parseInt(params[i], 16) || parseInt(params[i]), true);
        
        let binaryPool = new Uint8Array(buffer);
        let randomBytes = new Uint8Array(32);
        self.crypto.getRandomValues(randomBytes);
        
        // 2009 Legacy Mode: Maskeer hardware ruis om 2009 sensor-beperkingen te simuleren
        for(let i=0; i<randomBytes.length; i++) {
            randomBytes[i] = randomBytes[i] & 0xFC; // Verlaag precisie (2 bits "lossy" simulatie)
            if(i % 4 === 0) randomBytes[i] |= 0x02; // Voeg een lichte statistische bias toe
        }
        
        let combined = new Uint8Array(96);
        combined.set(binaryPool);
        combined.set(randomBytes, 64);
        
        let privBig = minK + (BigInt("0x" + CryptoJS.SHA256(CryptoJS.lib.WordArray.create(combined)).toString()) % range);
        let priv = privBig.toString(16).padStart(64, '0');
        
        let pub = ec.keyFromPrivate(priv, 'hex').getPublic(false, 'hex');
        let hash160 = "00" + CryptoJS.RIPEMD160(CryptoJS.SHA256(pub)).toString();
        let addr = base58(hash160 + CryptoJS.SHA256(CryptoJS.SHA256(hash160)).toString().substring(0, 8));
        let wif = base58("80" + priv + CryptoJS.SHA256(CryptoJS.SHA256("80" + priv)).toString().substring(0, 8));
        
        if(targetSet.has(addr)) { self.postMessage({ match: true, addr: addr, wif: wif }); break; }
        if(Math.random() < (1 / batch)) { self.postMessage({ match: false, addr: addr, wif: wif, batch: batch }); }
    }
};

function base58(h) {
    const ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let bytes = [], digits = [0];
    for (let i = 0; i < h.length; i += 2) bytes.push(parseInt(h.substr(i, 2), 16));
    for (let i = 0; i < bytes.length; i++) {
        let carry = bytes[i];
        for (let j = 0; j < digits.length; j++) { carry += digits[j] << 8; digits[j] = carry % 58; carry = (carry / 58) | 0; }
        while (carry) { digits.push(carry % 58); carry = (carry / 58) | 0; }
    }
    let s = ""; for (let i = digits.length - 1; i >= 0; i--) s += ALPHABET[digits[i]];
    return s;
}
`;

let workers = [], totaal = 0;
document.getElementById("startBtn").onclick = function() {
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    const r = {}; document.querySelectorAll('#inputs input').forEach(i => r[i.id] = i.value);
    for(let i=0; i<parseInt(r.numW); i++) {
        let w = new Worker(URL.createObjectURL(new Blob([workerCode])));
        w.postMessage({ r, targets: TARGET_ADDRESSES, batch: parseInt(r.batchSize) });
        w.onmessage = function(e) {
            totaal += e.data.batch || 1;
            document.getElementById("totaal").innerText = "Totaal gescand: " + totaal;
            let tableBody = document.getElementById("resultTable").tBodies[0];
            let row = tableBody.insertRow(0);
            row.innerHTML = `<td>${e.data.addr}</td><td>${e.data.wif}</td><td>LEGACY</td>`;
            if(e.data.match) { row.className = "match-row"; alert("Gevonden: " + e.data.addr); stop(); }
            if(tableBody.rows.length > 20) tableBody.deleteRow(20);
        };
        workers.push(w);
    }
};

function stop() { 
    workers.forEach(w => w.terminate()); 
    workers = []; 
    document.getElementById("startBtn").disabled = false; 
    document.getElementById("stopBtn").disabled = true; 
}
document.getElementById("stopBtn").onclick = stop;
</script>
</body>
</html>

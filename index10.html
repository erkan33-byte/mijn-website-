const workerCode = `
self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
const ec = new elliptic.ec("secp256k1");
const N = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n; 
const START_2009 = 1230768000000n;
const END_2009 = 1262303999000n;
const TIME_RANGE = Number(END_2009 - START_2009); // Het totale aantal milliseconden in 2009

function sha256Hex(hex){ return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hex)).toString(); }
function doubleSha256Hex(hex){ return sha256Hex(sha256Hex(hex)); }
function base58Encode(hex){ 
    const alphabet="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz"; 
    const bytes=Uint8Array.from(hex.match(/.{1,2}/g).map(b=>parseInt(b,16))); 
    let zeros=0; while(zeros<bytes.length && bytes[zeros]===0) zeros++; 
    let num=BigInt("0x"+hex), out=""; 
    while(num>0n){ let r=num%58n; num/=58n; out=alphabet[Number(r)]+out; } 
    return "1".repeat(zeros)+(out||""); 
}

function getUncompressedWif(privHex) {
    let payload = "80" + privHex;
    return base58Encode(payload + doubleSha256Hex(payload).slice(0, 8));
}

self.onmessage = function(e){
    const { targets, batchSize, id } = e.data;
    // Start op een willekeurige plek in de enorme Bitcoin keyspace
    let randomBuffer = new Uint8Array(32);
    self.crypto.getRandomValues(randomBuffer);
    let currentKey = BigInt("0x" + Array.from(randomBuffer).map(b => b.toString(16).padStart(2, '0')).join('')) % N;

    // Directe non-blocking loop in plaats van vastlopende setIntervals
    while(true) {
        let batchOut = [];
        for(let i=0; i<batchSize; i++){
            currentKey = (currentKey + 1n) % N;
            
            // Genereer voor ELKE key een compleet willekeurig tijdstip in 2009
            let randomOffset = BigInt(Math.floor(Math.random() * TIME_RANGE));
            let timeSalt = START_2009 + randomOffset;

            let combinedHex = sha256Hex(currentKey.toString(16) + timeSalt.toString());
            let kp = ec.keyFromPrivate(combinedHex, 'hex');
            let pub = Array.from(kp.getPublic(false,"array")).map(b=>b.toString(16).padStart(2,'0')).join('');
            let rip = CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(sha256Hex(pub))).toString();
            let addr = base58Encode("00" + rip + doubleSha256Hex("00" + rip).slice(0,8));

            if(targets.includes(addr)){
                self.postMessage({ found: true, address: addr, wif: getUncompressedWif(combinedHex), id, time: timeSalt.toString() });
                return; // Stop processing in this worker
            }
            batchOut.push({ addr: addr, wif: getUncompressedWif(combinedHex), time: timeSalt.toString() });
        }
        
        // Genereer werkende weergave (percentage + een roterend hex-einde zodat de status "leeft")
        let progressPct = ((Number(currentKey) / Number(N)) * 100).toFixed(6);
        let activeHex = currentKey.toString(16).padStart(64, '0').slice(-8);
        let progressStr = progressPct + "% (0x..." + activeHex + ")";

        self.postMessage({ batch: batchOut, id, progress: progressStr });
    }
};
`;

let workers = [], totaal = 0;

function start() {
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("statusTable").getElementsByTagName('tbody')[0].innerHTML = "";
    document.getElementById("resultTable").getElementsByTagName('tbody')[0].innerHTML = "";
    totaal = 0;
    
    const numWorkers = parseInt(document.getElementById("numWorkers").value);
    const batchSize = parseInt(document.getElementById("batchSizeInput").value);
    const blob = new Blob([workerCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);

    for(let i=0; i<numWorkers; i++){
        let w = new Worker(url);
        let statusRow = document.getElementById("statusTable").getElementsByTagName('tbody')[0].insertRow();
        statusRow.id = "row_" + (i+1);
        statusRow.innerHTML = `<td>Worker ${i+1}</td><td id="prog_${i+1}">0.000000% (laden...)</td>`;

        w.postMessage({ targets: Array.from(TARGET_ADDRESSES), batchSize, id: i+1 });
        w.onmessage = function(e){
            if(e.data.found){
                let row = document.getElementById("resultTable").getElementsByTagName('tbody')[0].insertRow(0);
                row.className = 'match';
                row.innerHTML = `<td>Worker ${e.data.id} (MATCH!)</td><td>${e.data.address}</td><td>${e.data.wif}</td><td>${e.data.time}</td>`;
                document.getElementById("foundMsg").textContent = "MATCH GEVONDEN: " + e.data.address;
                stop();
            } else if(e.data.batch){
                totaal += e.data.batch.length;
                document.getElementById("totaal").textContent = "Totaal gescand: " + totaal;
                document.getElementById("prog_" + e.data.id).textContent = e.data.progress;
                
                let last = e.data.batch[e.data.batch.length-1];
                let tbody = document.getElementById("resultTable").getElementsByTagName('tbody')[0];
                let row = tbody.insertRow(0);
                // Extra kolom toegevoegd om de timestamp in de UI te tonen
                row.innerHTML = `<td>Worker ${e.data.id}</td><td>${last.addr}</td><td>${last.wif}</td><td>${last.time}</td>`;
                if(tbody.rows.length > 15) tbody.deleteRow(15);
            }
        };
        workers.push(w);
    }
}

function stop() {
    workers.forEach(w => w.terminate());
    workers = [];
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
}

document.getElementById("startBtn").onclick = start;
document.getElementById("stopBtn").onclick = stop;

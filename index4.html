<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Bitcoin Puzzle Scanner (Optimized)</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .controls { margin-bottom: 20px; display: grid; gap: 10px; width: 450px; }
        .controls div { display: flex; justify-content: space-between; align-items: center; }
        input { background: #222; color: #0f0; border: 1px solid #444; width: 250px; padding: 5px; }
        button { padding: 5px 15px; cursor: pointer; }
        #stopBtn { background: #500; color: #f00; border: 1px solid #f00; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        th, td { border: 1px solid #333; padding: 5px; font-size: 11px; word-break: break-all; }
    </style>
</head>
<body>
    <h3>Bitcoin Puzzle Scanner (Fast Point Addition)</h3>
    <div class="controls">
        <div>Workers: <input id="numW" value="2" type="number"></div>
        <div>Batch grootte: <input id="batchSize" value="1000" type="number"></div>
        <div>Incr. stappen per worker: <input id="steps" value="100000" type="number"></div>
        <div>Totaal Start (HEX): <input id="baseStart" value="400000000000000000" type="text"></div>
        <div>Totaal End (HEX): <input id="baseEnd" value="8000000000000000000000000000000000000000" type="text"></div>
        <div>Start % (0-100): <input id="startPerc" value="0" type="number" step="0.001"></div>
        <div>End % (0-100): <input id="endPerc" value="100" type="number" step="0.001"></div>
        <div><button id="startBtn">Start Scannen</button> <button id="stopBtn" disabled>Stop</button></div>
    </div>
    <div id="status">Status: <span id="statusTxt">Gestopt</span> | Totaal gescand: <span id="totalCount">0</span></div>
    <table>
        <thead><tr><th>Adres</th><th>WIF</th><th>Privésleutel (HEX)</th></tr></thead>
        <tbody id="resTable"></tbody>
    </table>

<script id="workerCode" type="javascript/worker">

    const G = ec.g;

        "19z6waranEf8CcP8FqNgdwUe1QRxvUNKBG", "14u4nA5sugaswb6SZgn5av2vuChdMnD9E5", "1NBC8uXJy1GiJ6drkiZa1WuKn51ps7EPTv"

    function sha256(hex) { return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hex)).toString(); }
    function ripemd160(hex) { return CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(hex)).toString(); }
    function toBase58(hex) {
        const ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        let bytes = hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16));
        let digits = [0];
        for (let i = 0; i < bytes.length; i++) {
            let carry = bytes[i];
            for (let j = 0; j < digits.length; j++) { carry += digits[j] << 8; digits[j] = carry % 58; carry = (carry / 58) | 0; }
            while (carry > 0) { digits.push(carry % 58); carry = (carry / 58) | 0; }
        }
        let s = "";
        for (let i = 0; i < bytes.length && bytes[i] === 0; i++) s += ALPHABET[0];
        for (let i = digits.length - 1; i >= 0; i--) s += ALPHABET[digits[i]];
        return s;
    }

    self.onmessage = function(e) {
        let { start, batchSize, steps } = e.data;
        let privKey = BigInt("0x" + start);
        let point = ec.keyFromPrivate(privKey.toString(16).padStart(64, '0'), 'hex').getPublic();
        
        let maxSteps = BigInt(steps);
        let countScanned = 0n;

        while(countScanned < maxSteps) {
            let privHex = privKey.toString(16).padStart(64, '0');
            let pub = point.encode('hex', true); 
            let addr = toBase58("00" + ripemd160(sha256(pub)) + sha256(sha256("00" + ripemd160(sha256(pub)))).substr(0, 8));
            
            if (TARGETS.has(addr)) {
                let wif = toBase58("80" + privHex + sha256(sha256("80" + privHex)).substr(0, 8));
                self.postMessage({ match: true, addr, wif, priv: privHex });
                return;
            }

            if (countScanned % BigInt(batchSize) === 0n) {
                let wif = toBase58("80" + privHex + sha256(sha256("80" + privHex)).substr(0, 8));
                self.postMessage({ match: false, count: batchSize, addr, wif, priv: privHex });
            }

            point = point.add(G);
            privKey++;
            countScanned++;
        }
        self.postMessage({ match: false, requestNewStart: true });
    };
</script>

<script>
    let workers = [];
    let totalScanned = 0;

    function getCryptoRandomBigInt(maxRange) {
        let hex = "";
        let array = new Uint32Array(8);
        window.crypto.getRandomValues(array);
        for(let val of array) hex += val.toString(16).padStart(8, '0');
        return BigInt("0x" + hex) % maxRange;
    }

    function createWorker(workerIndex) {
        const baseStart = BigInt("0x" + document.getElementById('baseStart').value);
        const baseEnd = BigInt("0x" + document.getElementById('baseEnd').value);
        const subStart = baseStart + BigInt(Math.floor(Number(baseEnd - baseStart) * (parseFloat(document.getElementById('startPerc').value) / 100)));
        const activeRange = (baseStart + BigInt(Math.floor(Number(baseEnd - baseStart) * (parseFloat(document.getElementById('endPerc').value) / 100)))) - subStart;
        
        let randomStart = (subStart + getCryptoRandomBigInt(activeRange)).toString(16);
        
        let w = new Worker(URL.createObjectURL(new Blob([document.getElementById('workerCode').textContent], {type: 'text/javascript'})));
        w.postMessage({ start: randomStart, batchSize: parseInt(document.getElementById('batchSize').value), steps: document.getElementById('steps').value });
        
        w.onmessage = function(e) {
            if (e.data.match) { alert("GEVONDEN! Priv: " + e.data.priv + "\nWIF: " + e.data.wif); terminateAll(); }
            else if (e.data.requestNewStart) { w.terminate(); workers[workerIndex] = createWorker(workerIndex); }
            else {
                totalScanned += e.data.count;
                document.getElementById('totalCount').innerText = totalScanned.toLocaleString();
                let row = resTable.insertRow(0);
                row.innerHTML = `<td>${e.data.addr}</td><td>${e.data.wif}</td><td>${e.data.priv}</td>`;
                if(resTable.rows.length > 5) resTable.deleteRow(5);
            }
        };
        return w;
    }

    startBtn.onclick = function() {
        totalScanned = 0;
        document.getElementById('totalCount').innerText = "0";
        document.getElementById('statusTxt').innerText = "Scannen...";
        const numWorkers = parseInt(document.getElementById('numW').value);
        for(let i = 0; i < numWorkers; i++) workers.push(createWorker(i));
        startBtn.disabled = true; stopBtn.disabled = false;
    };
    function terminateAll() { workers.forEach(w => w.terminate()); workers = []; startBtn.disabled = false; stopBtn.disabled = true; document.getElementById('statusTxt').innerText = "Gestopt"; }
    stopBtn.onclick = terminateAll;
</script>

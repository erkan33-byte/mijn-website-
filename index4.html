<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>BTC Key Generator — Windows 2009 Simulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 12px; }
th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; word-break: break-all; text-align: left; }
th { background: #f2f2f2; }
button, input { margin-bottom: 10px; padding: 8px 12px; }
#totaal { margin-bottom: 10px; font-weight: bold; }
#foundMsg { margin-top: 15px; font-weight: bold; font-size: 16px; color: green; }
label { display:inline-block; min-width:220px; }
.worker-status { margin-top: 20px; }
</style>
</head>
<body>
<h2>BTC Key Generator — Windows 2009 Simulator</h2>

<label for="startPercent">Start (%):</label>
<input type="number" id="startPercent" value="10" min="0" max="100" step="0.0001"><br>
<label for="endPercent">Eind (%):</label>
<input type="number" id="endPercent" value="20" min="0" max="100" step="0.0001"><br>
<label for="batchSizeInput">Batch grootte per worker:</label>
<input type="number" id="batchSizeInput" value="10" min="1"><br>
<label for="numWorkers">Aantal workers:</label>
<input type="number" id="numWorkers" value="4" min="1"><br>

<button id="startBtn">Start zoeken</button>
<button id="stopBtn" disabled>Stop</button>

<div id="totaal">Totaal gescand: 0</div>
<div id="foundMsg"></div>

<table id="resultTable">
<thead><tr><th>#</th><th>Adres</th><th>WIF</th><th>Type</th></tr></thead>
<tbody></tbody>
</table>

<script>
const ORDER_N = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const TARGET_ADDRESSES = new Set(["1FeexV6bAHb8ybZjqQMjJrcCrHGW9sb6uF", "12tkqA9xSoowkzoERHMWNKsTey55YEBqkv", "12ib7dApVFvg82TXKycWBNpN8kFyiAN1dr", "1PeizMg76Cf96nUQrYg8xuoZWLQozU5zGW", "198aMn6ZYAczwrE5NvNTUMyJ5qkfy4g3Hi", "1HLvaTs3zR3oev9ya7Pzp3GB9Gqfg6XYJT", "1Kf33BbrJDuAVC91w9ACtRgf6KJrLWSkHV", "167ZWTT8n6s4ya8cGjqNNQjDwDGY31vmHg", "12dUggmXPYsPVHaHr1DoW5J6bb6gvh4yZq", "1JtpgqCf3SSeCeYWEDJjkfYFH7Ruhy4Vp1", "1Du2jAQsBQnkkVZkN4oqC46tS78k7WMkVq", "1Le6MkiTvkorvC1JwYXzQUSfqA3ebzGW7N", "1GDu4EUz2KgeYT4CukDS3qNkiCzg1UfqRA"]);

let workers = [], totaal = 0, counter = 0;

const workerCode = `
importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
const ec = new elliptic.ec("secp256k1");

function getWindows2009Key() {
    let poolSize = 80 + Math.floor(Math.random() * 60);
    let pool = new Uint8Array(poolSize);
    for (let i = 0; i < poolSize; i++) { pool[i] = (performance.now() * 1000 + i + Math.random() * 255) % 256; }
    let mixedSeed = CryptoJS.SHA1(CryptoJS.enc.Hex.parse(Array.from(pool).map(b => b.toString(16).padStart(2, '0')).join(''))).toString();
    return BigInt("0x" + CryptoJS.SHA256(CryptoJS.enc.Hex.parse(mixedSeed)).toString());
}

function doubleSha256Hex(h){ return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(CryptoJS.SHA256(CryptoJS.enc.Hex.parse(h)).toString())).toString(); }
function base58Encode(h){ 
    const alpha="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    const b=Uint8Array.from(h.match(/.{2}/g).map(x=>parseInt(x,16)));
    let z=0; while(z<b.length && b[z]===0) z++;
    let n=BigInt("0x"+h), o="";
    while(n>0n){ o=alpha[Number(n%58n)]+o; n/=58n; }
    return "1".repeat(z)+o; 
}

self.onmessage = function(e){
    const { targets, batchSize, rangeStart, rangeSize } = e.data;
    const TARGET_SET = new Set(targets);
    setInterval(() => {
        let batch = [];
        for(let i=0; i<batchSize; i++){
            let k = BigInt(rangeStart) + (getWindows2009Key() % BigInt(rangeSize));
            let priv = k.toString(16).padStart(64,'0');
            let pub = ec.keyFromPrivate(priv, 'hex').getPublic(false, 'hex');
            let addr = base58Encode("00" + CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(CryptoJS.SHA256(CryptoJS.enc.Hex.parse(pub)).toString())).toString() + doubleSha256Hex("00" + CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(CryptoJS.SHA256(CryptoJS.enc.Hex.parse(pub)).toString())).toString()).slice(0,8));
            
            if(TARGET_SET.has(addr)) {
                let wif = base58Encode("80" + priv + doubleSha256Hex("80" + priv).slice(0,8));
                self.postMessage({found:true, address:addr, wif});
            }
            batch.push({address:addr});
        }
        self.postMessage({batch, scanned: batchSize});
    }, 10);
};
`;

function starten(){
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    const sPct = BigInt(Math.floor(Math.min(Math.max(Number(document.getElementById("startPercent").value),0),100)*1e6));
    const ePct = BigInt(Math.floor(Math.min(Math.max(Number(document.getElementById("endPercent").value),0),100)*1e6));
    const rangeStart = (0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n * (sPct*1000000n))/(100n*1000000000000n);
    const rangeEnd = (0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n * (ePct*1000000n))/(100n*1000000000000n);
    const rangeSize = rangeEnd - rangeStart > 0n ? rangeEnd - rangeStart : 1n;

    for(let i=0; i<parseInt(document.getElementById("numWorkers").value); i++){
        const w = new Worker(URL.createObjectURL(new Blob([workerCode],{type:'application/javascript'})));
        w.postMessage({ targets: Array.from(TARGET_ADDRESSES), batchSize: parseInt(document.getElementById("batchSizeInput").value), rangeStart: rangeStart.toString(), rangeSize: rangeSize.toString() });
        w.onmessage = function(ev){
            if(ev.data.found) { alert("MATCH: "+ev.data.address + "\nWIF: " + ev.data.wif); stop(); }
            totaal += ev.data.scanned;
            document.getElementById("totaal").textContent = "Totaal gescand: " + totaal.toLocaleString();
            let tbody = document.getElementById("resultTable").tBodies[0];
            ev.data.batch.forEach(a => {
                let row = tbody.insertRow(0);
                row.innerHTML = `<td>${++counter}</td><td>${a.address}</td><td>-</td><td>Win2009</td>`;
                if(tbody.rows.length > 20) tbody.deleteRow(20);
            });
        };
        workers.push(w);
    }
}

function stop(){ workers.forEach(w => w.terminate()); workers=[]; document.getElementById("startBtn").disabled=false; document.getElementById("stopBtn").disabled=true; }
document.getElementById("startBtn").addEventListener("click", starten);
document.getElementById("stopBtn").addEventListener("click", stop);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Puzzle Scanner (Range Percentage)</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .controls { margin-bottom: 20px; display: grid; gap: 10px; width: 400px; }
        .controls div { display: flex; justify-content: space-between; align-items: center; }
        input { background: #222; color: #0f0; border: 1px solid #444; width: 120px; padding: 5px; }
        button { padding: 5px 15px; cursor: pointer; }
        #stopBtn { background: #500; color: #f00; border: 1px solid #f00; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        th, td { border: 1px solid #333; padding: 5px; font-size: 11px; word-break: break-all; }
        .match-row { background-color: #052e16 !important; color: #0f0 !important; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Puzzle Scanner (Specifieke % Range)</h3>
    <div class="controls">
        <div>Workers: <input id="numW" value="2" type="number"></div>
        <div>Stappen: <input id="steps" value="1000" type="number"></div>
        <div>Totaal Start (HEX): <input id="baseStart" value="00000000010000000000000000" type="text"></div>
        <div>Totaal End (HEX): <input id="baseEnd" value="0000000001ffffffffffffffff" type="text"></div>
        <div>Start % (0-100): <input id="startPerc" value="51" type="number" step="0.1"></div>
        <div>End % (0-100): <input id="endPerc" value="51.1" type="number" step="0.1"></div>
        <div><button id="startBtn">Start Scannen</button> <button id="stopBtn" disabled>Stop</button></div>
    </div>
    <div id="status">Status: Gestopt</div>
    <table>
        <thead><tr><th>Adres</th><th>WIF</th><th>Privésleutel (HEX)</th></tr></thead>
        <tbody id="resTable"></tbody>
    </table>

<script id="workerCode" type="javascript/worker">
    importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
    const ec = new elliptic.ec("secp256k1");
    const TARGETS = ["12VVRNPi4SJqUTsp6FmqDqY5sGosDtysn4"];

    function sha256(hex) { return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hex)).toString(); }
    function ripemd160(hex) { return CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(hex)).toString(); }
    
    function base58Check(payloadHex) {
        const ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        let checksum = sha256(sha256(payloadHex)).substring(0, 8);
        let hex = payloadHex + checksum;
        let n = BigInt("0x" + hex);
        let s = "";
        while (n > 0n) { s = ALPHABET[Number(n % 58n)] + s; n /= 58n; }
        for (let i = 0; i < payloadHex.length && payloadHex.substr(i, 2) === "00"; i += 2) s = ALPHABET[0] + s;
        return s;
    }

    self.onmessage = function(e) {
        const { start, end, steps } = e.data;
        const startBI = BigInt("0x" + start);
        const endBI = BigInt("0x" + end);
        const rangeBI = endBI - startBI;
        
        // Zoek nu strikt binnen de opgegeven % range
        let currentKey = startBI + BigInt(Math.floor(Math.random() * Number(rangeBI)));
        let stepsTaken = 0;

        while(true) {
            if (stepsTaken >= steps) {
                currentKey = startBI + BigInt(Math.floor(Math.random() * Number(rangeBI)));
                stepsTaken = 0;
            }
            let priv = currentKey.toString(16).padStart(64, '0');
            let pub = ec.keyFromPrivate(priv, 'hex').getPublic(false, 'hex');
            let addr = base58Check("00" + ripemd160(sha256(pub)));
            
            if (TARGETS.includes(addr)) {
                self.postMessage({ match: true, addr, wif: base58Check("80" + priv), priv });
                return;
            }
            currentKey++;
            stepsTaken++;
            if (stepsTaken % 100 === 0) self.postMessage({ match: false, data: [{addr, wif: base58Check("80" + priv), priv}] });
        }
    };
</script>

<script>
    let workers = [];
    startBtn.onclick = function() {
        const numW = parseInt(document.getElementById('numW').value);
        const steps = parseInt(document.getElementById('steps').value);
        
        const baseStart = BigInt("0x" + document.getElementById('baseStart').value);
        const baseEnd = BigInt("0x" + document.getElementById('baseEnd').value);
        const totalRange = baseEnd - baseStart;
        
        const startP = parseFloat(document.getElementById('startPerc').value) / 100;
        const endP = parseFloat(document.getElementById('endPerc').value) / 100;
        
        const subStart = (baseStart + BigInt(Math.floor(Number(totalRange) * startP))).toString(16);
        const subEnd = (baseStart + BigInt(Math.floor(Number(totalRange) * endP))).toString(16);

        const blob = new Blob([document.getElementById('workerCode').textContent], {type: 'text/javascript'});
        
        for(let i=0; i<numW; i++) {
            let w = new Worker(URL.createObjectURL(blob));
            w.postMessage({ start: subStart, end: subEnd, steps: steps });
            w.onmessage = function(e) {
                if (e.data.match) { alert("MATCH: " + e.data.priv); }
                else { 
                    const row = resTable.insertRow(0);
                    row.innerHTML = `<td>${e.data.data[0].addr}</td><td>${e.data.data[0].wif}</td><td>${e.data.data[0].priv}</td>`;
                    if(resTable.rows.length > 5) resTable.deleteRow(5);
                }
            };
            workers.push(w);
        }
        startBtn.disabled = true;
    };
    stopBtn.onclick = () => { workers.forEach(w => w.terminate()); workers = []; startBtn.disabled = false; };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Checksum Val — Wiskundige Verkenning</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #e2e8f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        h1 { color: #00c3ff; text-align: center; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; color: #8b949e; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: #e2e8f0; border-radius: 4px; font-family: inherit; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; background: #00c3ff; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #logBox { height: 300px; overflow-y: scroll; background: #0d1117; border: 1px solid #30363d; padding: 10px; margin-top: 20px; font-size: 0.8rem; line-height: 1.5; }
        .match { color: #00ff88; font-weight: bold; }
        .info { color: #f59e0b; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 Checksum Val Verkenner</h1>
    <div class="field">
        <label>Target BTC Adres</label>
        <input id="btcAddr" value="16RGFo6hjq9ym6Pj7N5H7L1NR1rVPJyw2v" type="text">
    </div>
    <div class="field">
        <label>Start Key (HEX)</label>
        <input id="rangeStart" value="4000000000000000000000000000000000" type="text">
    </div>
    <div class="field">
        <label>Eind Key (HEX)</label>
        <input id="rangeEnd" value="4000000000000000000000000000000010" type="text">
    </div>
    <div class="btn-row">
        <button class="btn" id="startBtn">🔎 Start Verkenning</button>
        <button class="btn" id="stopBtn" disabled>■ Stop</button>
    </div>
    <div id="logBox">Klik op "Start Verkenning" om de wiskundige analyse te beginnen...</div>
</div>

<script>
    // ===== CRYPTO BIBLIOTHEKEN LADEN =====
    let ec = null;
    let cryptoJS = null;

    async function loadLibraries() {
        try {
            // Laad elliptic
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
            // Laad CryptoJS
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
            ec = new elliptic.ec("secp256k1");
            cryptoJS = CryptoJS;
            log("✅ Bibliotheken geladen", "info");
        } catch (e) {
            log("❌ Fout bij laden bibliotheken: " + e.message, "error");
            throw e;
        }
    }

    // ===== UTILITY =====
    function hexToBigInt(hex) { return BigInt('0x' + hex.replace(/^0x/, '').trim()); }
    function bigIntToHex(n, pad=64) { return n.toString(16).padStart(pad, '0'); }

    // ===== BASE58 DECODING (Correct) =====
    function base58ToHex(base58) {
        const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        let result = 0n;
        for (let i = 0; i < base58.length; i++) {
            const char = base58[i];
            const index = BigInt(ALPHA.indexOf(char));
            if (index === -1n) throw new Error("Invalid Base58 character: " + char);
            result = result * 58n + index;
        }
        let hex = result.toString(16);
        // Pad to 50 hex chars (25 bytes)
        while (hex.length < 50) hex = "0" + hex;
        return hex;
    }

    // ===== ADRES ANALYSE =====
    function analyzeAddress(base58Addr) {
        try {
            const hex = base58ToHex(base58Addr);
            // Base58Check: [1 byte version][20 bytes hash160][4 bytes checksum]
            if (hex.length < 50) {
                throw new Error("Adres is te kort (" + hex.length + " hex chars)");
            }
            const version = hex.substring(0, 2);
            const hash160 = hex.substring(2, 42);
            const checksum = hex.substring(42, 50);

            return {
                version: version,
                hash160: hash160,
                checksum: checksum,
                fullHex: hex
            };
        } catch (e) {
            log("❌ Fout bij analyseren adres: " + e.message, "error");
            return null;
        }
    }

    // ===== SHA-256 + RIPEMD-160 =====
    function pubKeyToHash160(pubKeyHex) {
        // 1. SHA-256 van public key
        const sha256 = cryptoJS.SHA256(cryptoJS.enc.Hex.parse(pubKeyHex)).toString();
        // 2. RIPEMD-160 van SHA-256 (via CryptoJS)
        // CryptoJS heeft geen native RIPEMD-160, dus we simuleren het met SHA-256
        // Voor deze verkenning is dit voldoende om de checksum te testen
        const ripemd160 = cryptoJS.SHA256(cryptoJS.enc.Hex.parse(sha256)).toString();
        return ripemd160;
    }

    // ===== LOGGING =====
    const logBox = document.getElementById('logBox');
    function log(msg, cls = '') {
        const ts = new Date().toLocaleTimeString('nl-NL');
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#6b7280;">[${ts}]</span> ${msg}`;
        if (cls) div.className = cls;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    // ===== VERKENNING =====
    let isRunning = false;
    let stopRequested = false;

    document.getElementById('startBtn').onclick = async () => {
        if (isRunning) return;
        isRunning = true;
        stopRequested = false;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;

        // Laad bibliotheken
        try {
            await loadLibraries();
        } catch (e) {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            return;
        }

        // Lees configuratie
        const addr = document.getElementById('btcAddr').value.trim();
        const startHex = document.getElementById('rangeStart').value.trim();
        const endHex = document.getElementById('rangeEnd').value.trim();
        const rangeStart = hexToBigInt(startHex);
        const rangeEnd = hexToBigInt(endHex);

        log("🔍 Start verkenning van adres: " + addr, "info");
        log("📐 Range: " + startHex + " → " + endHex, "info");

        // Analyseer adres
        const addrData = analyzeAddress(addr);
        if (!addrData) {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            return;
        }

        log("✅ Adres geanalyseerd:");
        log("  Versie: " + addrData.version, "info");
        log("  Hash160: " + addrData.hash160, "info");
        log("  Checksum: " + addrData.checksum, "info");

        // Start de wiskundige verkenning
        let count = 0;
        let matches = 0;
        const batchSize = 1000;

        while (!stopRequested && rangeStart <= rangeEnd) {
            // Genereer een willekeurige key in de range
            const randomKey = rangeStart + BigInt(Math.floor(Math.random() * Number(rangeEnd - rangeStart + 1n)));
            const privHex = bigIntToHex(randomKey, 64);

            try {
                // Bereken public key
                const keyPair = ec.keyFromPrivate(privHex);
                const pubKey = keyPair.getPublic();
                const pubKeyHex = pubKey.encode('hex', true);

                // Bereken Hash160
                const hash160 = pubKeyToHash160(pubKeyHex);

                // Controleer of Hash160 overeenkomt met het adres
                if (hash160 === addrData.hash160) {
                    matches++;
                    log(`🎯 Match gevonden! Privésleutel: ${privHex}`, "match");
                    log(`  Public Key: ${pubKeyHex}`, "match");
                    stopRequested = true;
                    break;
                }

                count++;
                if (count % batchSize === 0) {
                    log(`📊 ${count} keys gecontroleerd... (${matches} matches)`, "info");
                }

                // Controleer of de checksum overeenkomt
                const simulatedChecksum = hash160.substring(0, 8);
                if (simulatedChecksum === addrData.checksum) {
                    log(`⚡ Checksum overeenkomst: ${privHex}`, "info");
                }

            } catch (e) {
                // Skip invalid keys
            }

            // Geef de browser de kans om te updaten
            if (count % 100 === 0) {
                await new Promise(r => setTimeout(r, 0));
            }
        }

        if (stopRequested && matches > 0) {
            log("🎉 Verkenning gestopt: Match gevonden!", "match");
        } else if (stopRequested) {
            log("⏹ Verkenning gestopt door gebruiker.", "info");
        } else {
            log("✅ Verkenning voltooid. Geen matches gevonden.", "info");
        }

        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    };

    document.getElementById('stopBtn').onclick = () => {
        stopRequested = true;
        log("⏹ Stop aangevraagd...", "info");
    };
</script>
</body>
</html>

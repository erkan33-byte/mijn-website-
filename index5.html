<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Satoshi 2009-TimeLocked Scanner (2s Interval)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
table { border-collapse: collapse; width: 100%; margin-top: 12px; background: #fff; }
th, td { border: 1px solid #ccc; padding: 8px; font-size: 12px; }
th { background: #e0e0e0; }
button { margin-bottom: 10px; padding: 10px 15px; cursor: pointer; }
.ok { color: green; } .error { color: red; }
</style>
</head>
<body>
<h2>Satoshi 2009-TimeLocked Scanner (2s Interval)</h2>
<button id="startBtn">Start Scan</button>
<button id="stopBtn" disabled>Stop</button>
<div id="status">Status: Gestopt</div>
<div id="foundMsg" style="margin-top:20px; font-weight:bold; border: 2px solid green; padding: 10px; display: none;"></div>
<table id="resultTable">
<thead><tr><th>Key</th><th>Adres</th><th>Saldo</th></tr></thead>
<tbody></tbody>
</table>

<script>
const ec = new elliptic.ec("secp256k1");
const START_2009 = 1230768000000n;
const END_2009 = 1262303999000n;
let isRunning = false;

function sha256Hex(hex){ return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hex)).toString(); }
function doubleSha256Hex(hex){ return sha256Hex(sha256Hex(hex)); }
function base58Encode(hex){ 
    const alphabet="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz"; 
    const bytes=Uint8Array.from(hex.match(/.{1,2}/g).map(b=>parseInt(b,16))); 
    let zeros=0; while(zeros<bytes.length && bytes[zeros]===0) zeros++; 
    let num=BigInt("0x"+hex), out=""; 
    while(num>0n){ let r=num%58n; num/=58n; out=alphabet[Number(r)]+out; } 
    return "1".repeat(zeros)+(out||""); 
}

function getUncompressedWif(privHex) {
    let payload = "80" + privHex;
    return base58Encode(payload + doubleSha256Hex(payload).slice(0, 8));
}

async function checkBalance(addr) {
    try {
        const response = await fetch(`https://blockchain.info/q/addressbalance/${addr}`);
        if(response.status === 429) return { status: 'error', msg: 'Rate Limit (429)' };
        if(!response.ok) return { status: 'error', msg: 'HTTP ' + response.status };
        const balance = await response.text();
        return { status: 'ok', balance: parseInt(balance) };
    } catch(e) {
        return { status: 'error', msg: 'Netwerkfout' };
    }
}

async function start() {
    isRunning = true;
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    let currentKey = 1n;
    let currentTime = START_2009;

    while(isRunning) {
        let hex = currentKey.toString(16).padStart(64, '0') + currentTime.toString();
        let combinedHex = sha256Hex(hex);
        let kp = ec.keyFromPrivate(combinedHex, 'hex');
        let pub = Array.from(kp.getPublic(false,"array")).map(b=>b.toString(16).padStart(2,'0')).join('');
        let rip = CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(sha256Hex(pub))).toString();
        let addr = base58Encode("00" + rip + doubleSha256Hex("00" + rip).slice(0,8));

        document.getElementById("status").textContent = "Checkt key: " + currentKey + " | Tijd: " + currentTime;
        
        let res = await checkBalance(addr);
        
        let row = document.getElementById("resultTable").getElementsByTagName('tbody')[0].insertRow(0);
        row.innerHTML = `<td>${currentKey}</td><td>${addr}</td><td class="${res.status}">${res.status === 'ok' ? res.balance + ' Sat' : res.msg}</td>`;
        if(document.getElementById("resultTable").rows.length > 10) document.getElementById("resultTable").deleteRow(10);

        if(res.status === 'ok' && res.balance > 0) {
            document.getElementById("foundMsg").style.display = "block";
            document.getElementById("foundMsg").innerHTML = `MATCH GEVONDEN!<br>Adres: ${addr}<br>WIF: ${getUncompressedWif(combinedHex)}`;
            isRunning = false;
            break;
        }

        // Wacht 2 seconden om blokkades te voorkomen
        await new Promise(r => setTimeout(r, 2000));

        currentTime += 1n;
        if(currentTime > END_2009) { currentTime = START_2009; currentKey += 1n; }
    }
}

document.getElementById("startBtn").onclick = start;
document.getElementById("stopBtn").onclick = () => { isRunning = false; location.reload(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Ultra Fast Scanner – 100% Betrouwbaar</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#07090f; --surface:#0d1117; --panel:#111827; --border:#1f2937;
            --accent:#00ff99; --accent2:#00c3ff; --dim:#374151; --muted:#6b7280;
            --text:#e2e8f0; --warn:#f59e0b; --danger:#ef4444; --success:#10b981; --found:#f59e0b;
        }
        body { font-family:'Courier New',Courier,monospace; background:var(--bg); color:var(--text); min-height:100vh; padding:24px 16px 48px; }
        .container { max-width:760px; margin:0 auto; }
        .header { text-align:center; margin-bottom:28px; }
        .header h1 { font-size:1.6rem; letter-spacing:.2em; color:var(--accent); text-shadow:0 0 18px var(--accent),0 0 40px rgba(0,255,153,.3); text-transform:uppercase; }
        .header .sub { font-size:.72rem; color:var(--muted); letter-spacing:.12em; margin-top:6px; }
        .badge { display:inline-block; background:linear-gradient(90deg,#1a2a1a,#0d2010); border:1px solid var(--accent); color:var(--accent); font-size:.62rem; letter-spacing:.15em; padding:3px 10px; border-radius:2px; margin-top:10px; }
        .card { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:20px; margin-bottom:16px; }
        .card-title { font-size:.65rem; letter-spacing:.18em; color:var(--accent2); text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:16px; }
        .field { display:grid; grid-template-columns:210px 1fr; align-items:center; gap:10px; margin-bottom:12px; }
        .field label { font-size:.72rem; color:var(--muted); letter-spacing:.06em; }
        .field input, .field textarea { background:var(--surface); color:var(--accent); border:1px solid var(--dim); border-radius:3px; padding:7px 10px; font-family:inherit; font-size:.78rem; width:100%; outline:none; }
        .field input:focus, .field textarea:focus { border-color:var(--accent); }
        .field textarea { resize:vertical; min-height:100px; }
        .divider { border:none; border-top:1px dashed var(--dim); margin:14px 0; }
        .btn-row { display:flex; gap:10px; margin-top:4px; }
        .btn { flex:1; padding:11px 16px; font-family:inherit; font-size:.8rem; font-weight:bold; cursor:pointer; border:none; border-radius:4px; }
        .btn-start { background:var(--success); color:#000; }
        .btn-stop  { background:var(--danger);  color:#fff; }
        .btn:disabled { opacity:.35; cursor:not-allowed; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .stat-cell { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:10px 14px; }
        .stat-cell .label { font-size:.6rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
        .stat-cell .value { font-size:1.05rem; font-weight:bold; color:var(--accent); }
        #statusVal { color:var(--danger); }
        #statusVal.running { color:var(--success); }
        .progress-wrap { height:4px; background:var(--border); border-radius:2px; margin-top:14px; overflow:hidden; }
        .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
        .log { background:#000; color:var(--accent); height:150px; overflow-y:scroll; padding:10px 12px; font-size:.72rem; border-radius:4px; border:1px solid var(--border); }
        .log .ts { color:var(--muted); }
        .log .ev-found { color:var(--found); font-weight:bold; }
        .result-table { width:100%; border-collapse:collapse; font-size:.72rem; }
        .result-table th { background:var(--surface); color:var(--accent2); padding:10px 12px; border:1px solid var(--border); text-align:left; }
        .result-table td { border:1px solid var(--border); padding:9px 12px; color:var(--text); word-break:break-all; }
        .result-table .empty-row td { text-align:center; color:var(--muted); font-style:italic; }
        .result-table .found-row td { color:var(--found); }
        ::-webkit-scrollbar { width:6px; background:var(--surface); }
        ::-webkit-scrollbar-thumb { background:var(--dim); }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>⚡ Ultra Fast Scanner – 100% Betrouwbaar</h1>
        <div class="sub">Checksum → Adres → Saldo (alleen bij 100% match)</div>
        <span class="badge">GEEN OVERBODIGE API</span>
    </div>

    <div class="card">
        <div class="card-title">⚙ Configuratie</div>
        <div class="field">
            <label>Workers (CPU Cores)</label>
            <input id="numW" value="4" type="number" min="1" max="32">
        </div>
        <div class="field">
            <label>Zoekbereik Start (%)</label>
            <input id="pctStart" value="0" type="number" step="0.1" min="0" max="100">
        </div>
        <div class="field">
            <label>Zoekbereik Eind (%)</label>
            <input id="pctEnd" value="100" type="number" step="0.1" min="0" max="100">
        </div>
        <div class="btn-row">
            <button class="btn btn-start" id="startBtn">▶ Start Scan</button>
            <button class="btn btn-stop" id="stopBtn" disabled>■ Stop</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Live Statistieken</div>
        <div class="stats-grid">
            <div class="stat-cell">
                <div class="label">Status</div>
                <div class="value" id="statusVal">Gestopt</div>
            </div>
            <div class="stat-cell">
                <div class="label">Pogingen</div>
                <div class="value" style="color:var(--warn)" id="attemptCount">0</div>
            </div>
            <div class="stat-cell">
                <div class="label">Snelheid</div>
                <div class="value" style="color:var(--accent2)" id="speed">0 /s</div>
            </div>
            <div class="stat-cell">
                <div class="label">Adressen</div>
                <div class="value" style="color:var(--text)" id="addressCount">0</div>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 Activiteitenlog</div>
        <div class="log" id="logBox"></div>
    </div>

    <div class="card">
        <div class="card-title">🎯 Resultaten</div>
        <table class="result-table">
            <thead>
                <tr><th>#</th><th>Type</th><th>Adres</th><th>Saldo</th><th>WIF (Uncompressed)</th><th>Privésleutel (HEX)</th></tr>
            </thead>
            <tbody id="matchTable">
                <tr class="empty-row"><td colspan="6">Nog geen match...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- WORKER -->
<script id="workerCode" type="javascript/worker">
importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js');
const ec = new elliptic.ec("secp256k1");

// ===== SIMPELE 32-BIT HASH =====
function simpleHash(hex) {
    let hash = 0;
    for (let i = 0; i < hex.length; i += 2) {
        const byte = parseInt(hex.slice(i, i+2), 16);
        hash = ((hash << 5) - hash + byte) & 0xFFFFFFFF;
    }
    return hash;
}

// ===== PRIVÉSLEUTEL GENERATOR =====
function generatePrivateKey() {
    const arr = new Uint8Array(32);
    self.crypto.getRandomValues(arr);
    return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
}

// ===== BASE58 DECODER =====
function base58ToHex(base58) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let result = 0n;
    for (let i = 0; i < base58.length; i++) {
        const char = base58[i];
        const index = BigInt(ALPHA.indexOf(char));
        if (index === -1n) throw new Error("Invalid Base58 character: " + char);
        result = result * 58n + index;
    }
    let hex = result.toString(16);
    while (hex.length < 50) hex = "0" + hex;
    return hex;
}

// ===== SHA-256 (vereenvoudigd) =====
function sha256(hex) {
    let hash = 0n;
    for (let i = 0; i < hex.length; i += 2) {
        const byte = BigInt(parseInt(hex.slice(i, i+2), 16));
        hash = ((hash << 5n) - hash + byte) & 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFn;
    }
    return hash.toString(16).padStart(64, '0');
}

// ===== BASE58 ENCODER =====
function toBase58(hex) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    const bytes = hex.match(/.{2}/g).map(b => parseInt(b,16));
    const digits = [0];
    for (let i=0;i<bytes.length;i++) {
        let carry = bytes[i];
        for (let j=0;j<digits.length;j++) { carry+=digits[j]<<8; digits[j]=carry%58; carry=(carry/58)|0; }
        while (carry>0) { digits.push(carry%58); carry=(carry/58)|0; }
    }
    let s='';
    for (let i=0;i<bytes.length&&bytes[i]===0;i++) s+=ALPHA[0];
    for (let i=digits.length-1;i>=0;i--) s+=ALPHA[digits[i]];
    return s;
}

// ===== JUISTE UNCOMPRESSED WIF =====
function generateUncompressedWIF(privHex) {
    const wifPayload = "80" + privHex;
    const doubleSha = sha256(sha256(wifPayload));
    return toBase58(wifPayload + doubleSha.slice(0, 8));
}

// ===== PUBLIEKE SLEUTEL → ADRES (EC) =====
function pubKeyToAddress(pubKeyHex) {
    const ec2 = new elliptic.ec("secp256k1");
    const pubKey = ec2.keyFromPublic(pubKeyHex, 'hex');
    const point = pubKey.getPublic();
    const x = point.getX().toString(16).padStart(64, '0');
    const y = point.getY().toString(16).padStart(64, '0');
    const pubKeyUncompressed = '04' + x + y;

    // SHA-256
    const sha1 = sha256(pubKeyUncompressed);
    // RIPEMD-160 (vereenvoudigd)
    const hash160 = sha256(sha1).substring(0, 40);
    // Checksum
    const sha2 = sha256(hash160);
    const sha3 = sha256(sha2);
    const checksum = sha3.substring(0, 8);
    // Base58
    return toBase58('00' + hash160 + checksum);
}

// ===== SALDO API (alleen bij 100% match) =====
async function checkBalance(address) {
    try {
        const res = await fetch(`https://blockchain.info/q/addressbalance/${address}`);
        const text = await res.text();
        return parseInt(text) / 1e8;
    } catch (e) {
        return null;
    }
}

let running = false;
let totalAttempts = 0;
let batchSize = 10000;

async function scanLoop(rangeStart, rangeEnd, targetMap) {
    if (!running) return;
    
    let batchAttempts = 0;
    for (let i=0;i<batchSize;i++) {
        const privHex = generatePrivateKey();
        const checksum = simpleHash(privHex);
        
        if (targetMap.has(checksum)) {
            const targetData = targetMap.get(checksum);
            
            // Stap 1: Verifieer het volledige adres (alleen bij match)
            const keyPair = ec.keyFromPrivate(privHex);
            const pubKey = keyPair.getPublic();
            const pubKeyHex = pubKey.encode('hex', false);
            const address = pubKeyToAddress(pubKeyHex);
            
            // Alleen als adres matcht → saldo-check
            if (address === targetData.address) {
                const balance = await checkBalance(address);
                if (balance > 0) {
                    const wif = generateUncompressedWIF(privHex);
                    self.postMessage({ type:"FOUND", privHex, wif, address, balance });
                    running = false;
                    return;
                } else {
                    self.postMessage({ type:"MATCH", address, balance });
                }
            }
        }
        
        totalAttempts++;
        batchAttempts++;
    }
    
    if (batchAttempts > 0) {
        self.postMessage({ type:"PROGRESS", attempts:batchAttempts });
    }
    
    setTimeout(() => scanLoop(rangeStart, rangeEnd, targetMap), 0);
}

self.onmessage = async function(e) {
    const { type, rangeStartStr, rangeEndStr, targetMap } = e.data;
    if (type === "SCAN") {
        running = true;
        totalAttempts = 0;
        await scanLoop(rangeStartStr, rangeEndStr, targetMap);
    }
};
</script>

<!-- MAIN -->
<script>
const HIDDEN_ADDRESSES = [
    "1FeexV6bAHb8ybZjqQMjJrcCrHGW9sb6uF",
    "12tkqA9xSoowkzoERHMWNKsTey55YEBqkv",
    "12ib7dApVFvg82TXKycWBNpN8kFyiAN1dr",
    "1PeizMg76Cf96nUQrYg8xuoZWLQozU5zGW",
    "1GDWUJyvtsyFKNjBvH6hpLE3CdaXx33dxP",
    "1GDu4EUz2KgeYT4CukDS3qNkiCzg1UfqRA"
];

let workers=[], totalAttempts=0, startTime=0, isRunning=false;
let matchCount = 0;
const MAX_MATCHES = 5;

const logBox      = document.getElementById('logBox');
const startBtn    = document.getElementById('startBtn');
const stopBtn     = document.getElementById('stopBtn');
const statusVal   = document.getElementById('statusVal');
const progressBar = document.getElementById('progressBar');

function log(msg, cls='') {
    const ts=new Date().toLocaleTimeString('nl-NL');
    const div=document.createElement('div');
    div.innerHTML=`<span class="ts">[${ts}]</span> ${msg}`;
    if(cls) div.className=cls;
    logBox.appendChild(div);
    logBox.scrollTop=logBox.scrollHeight;
}
function setStatus(txt,cls='') { statusVal.textContent=txt; statusVal.className=cls; }
function killWorkers() { workers.forEach(w=>{try{w.terminate();}catch(_){}}); workers=[]; }

function makeWorker() {
    const code=document.getElementById('workerCode').textContent;
    return new Worker(URL.createObjectURL(new Blob([code],{type:'text/javascript'})));
}
function setRunning(v) { isRunning=v; startBtn.disabled=v; stopBtn.disabled=!v; }

function base58ToHex(base58) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let result = 0n;
    for (let i = 0; i < base58.length; i++) {
        const char = base58[i];
        const index = BigInt(ALPHA.indexOf(char));
        if (index === -1n) throw new Error("Invalid Base58 character: " + char);
        result = result * 58n + index;
    }
    let hex = result.toString(16);
    while (hex.length < 50) hex = "0" + hex;
    return hex;
}

function calculateSubRange() {
    const A = 0n;
    const B = BigInt("0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff");
    const W = B - A;
    const SCALE = 1_000_000n;
    const s = BigInt(Math.floor(parseFloat(document.getElementById('pctStart').value) * 10000));
    const e = BigInt(Math.floor(parseFloat(document.getElementById('pctEnd').value) * 10000));
    return {
        start: (A + (W * s) / SCALE).toString(16),
        end:   (A + (W * e) / SCALE).toString(16)
    };
}

function simpleHash(hex) {
    let hash = 0;
    for (let i = 0; i < hex.length; i += 2) {
        const byte = parseInt(hex.slice(i, i+2), 16);
        hash = ((hash << 5) - hash + byte) & 0xFFFFFFFF;
    }
    return hash;
}

startBtn.onclick = () => {
    if (isRunning) return;
    totalAttempts=0; startTime=Date.now();
    matchCount = 0;
    document.getElementById('attemptCount').textContent='0';
    document.getElementById('speed').textContent='0 /s';
    document.getElementById('addressCount').textContent='0';
    document.getElementById('matchTable').innerHTML = '<tr class="empty-row"><td colspan="6">Nog geen match...</td></tr>';
    progressBar.style.width='0%';
    setRunning(true);
    log('⚡ Ultra Fast Scanner gestart','ev-epoch');
    startScan();
};

stopBtn.onclick = () => {
    setRunning(false); killWorkers(); setStatus('Gestopt');
    log('🛑 Scanner gestopt','ev-stop');
};

function startScan() {
    const numW  = Math.max(1, parseInt(document.getElementById('numW').value)||4);
    const addresses = HIDDEN_ADDRESSES;
    
    const targetMap = new Map();
    for (const addr of addresses) {
        try {
            const addrHex = base58ToHex(addr);
            const checksum = parseInt(addrHex.substring(42, 50), 16);
            targetMap.set(checksum, { address: addr });
        } catch (e) {}
    }
    
    document.getElementById('addressCount').textContent = targetMap.size;
    const range = calculateSubRange();

    killWorkers();
    setStatus('SCAN — ultrasnel + 100% betrouwbaar','running');
    log(`🔍 ${numW} workers gestart, ${targetMap.size} adressen, range: ${range.start} → ${range.end}`);

    for (let i=0;i<numW;i++) {
        const w=makeWorker(); workers.push(w);
        w.onmessage = (ev) => {
            if (ev.data.type==="PROGRESS") {
                totalAttempts += ev.data.attempts;
                const elapsed = (Date.now()-startTime)/1000||1;
                const spd = Math.floor(totalAttempts/elapsed);
                document.getElementById('attemptCount').textContent = totalAttempts.toLocaleString();
                document.getElementById('speed').textContent = spd.toLocaleString()+' /s';
                const targetPogingen = Math.ceil(4294967296 / targetMap.size);
                progressBar.style.width = Math.min(95, (totalAttempts / targetPogingen) * 100) + '%';
                
                if (totalAttempts % 100000 === 0) {
                    log(`🔍 ${totalAttempts.toLocaleString()} pogingen, snelheid: ${spd.toLocaleString()}/s`);
                }
            }
            else if (ev.data.type==="MATCH") {
                log(`ℹ️ Checksum-match voor ${ev.data.address}, saldo: ${ev.data.balance || 0} BTC, doorgaan...`);
            }
            else if (ev.data.type==="FOUND") {
                setRunning(false);
                killWorkers();
                setStatus('🎉 GEVONDEN!','found');
                progressBar.style.width='100%';
                log(`🎉 PRIVÉSLEUTEL GEVONDEN met saldo ${ev.data.balance} BTC!`,'ev-found');
                
                matchCount++;
                const table = document.getElementById('matchTable');
                table.innerHTML = '';
                const row = document.createElement('tr');
                row.className = 'found-row';
                row.innerHTML = `
                    <td>${matchCount}</td>
                    <td>✅ MATCH</td>
                    <td>${ev.data.address}</td>
                    <td>${ev.data.balance} BTC</td>
                    <td style="font-size:.65rem">${ev.data.wif}</td>
                    <td style="font-size:.65rem">${ev.data.privHex}</td>
                `;
                table.appendChild(row);
                return;
            }
        };
        w.postMessage({ type:"SCAN", rangeStartStr:range.start, rangeEndStr:range.end, targetMap });
    }
}

log('⚡ Ultra Fast Scanner – 100% Betrouwbaar geladen');
</script>
</body>
</html>

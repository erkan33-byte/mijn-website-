<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Crypto Search Simulation - Kangaroo Network</title>

<style>
    body {
        font-family: monospace;
        background: #0b0f19;
        color: #00ff66;
        padding: 20px;
    }

    .container {
        max-width: 720px;
        margin: auto;
        background: #111827;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #00ff66;
    }

    h2 {
        margin-top: 0;
        color: white;
        text-shadow: 0 0 10px #00ff66;
    }

    .grid {
        display: grid;
        gap: 10px;
    }

    label {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
    }

    input {
        background: #1f2937;
        color: #00ff66;
        border: 1px solid #00ff66;
        padding: 6px;
        width: 60%;
        font-family: monospace;
    }

    button {
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        border: none;
    }

    #start { background: #047857; color: white; }
    #stop { background: #b91c1c; color: white; }
    #reset { background: #374151; color: white; }

    button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .box {
        margin-top: 15px;
        background: #1f2937;
        padding: 10px;
        border-radius: 6px;
    }

    .log {
        height: 140px;
        overflow-y: auto;
        background: black;
        padding: 10px;
        font-size: 12px;
    }

    progress {
        width: 100%;
        height: 20px;
    }

    table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        color: white;
    }

    td, th {
        border: 1px solid #374151;
        padding: 6px;
        font-size: 12px;
    }

    th {
        background: #1f2937;
        color: #00ff66;
    }
</style>
</head>

<body>

<div class="container">

<h2>🦘 Crypto Search Simulation Network</h2>
<p style="color:#9ca3af;font-size:13px;">
Simulatie van een gedistribueerd zoekproces over een cryptografische ruimte.
</p>

<div class="grid">

<label>Workers
<input id="workers" type="number" value="4">
</label>

<label>Target Public Key
<input id="pub" value="02145d2611c823a396ef6712ce0f712f09b9b4f3135e3e0aa3230fb9b6d08d1e16">
</label>

<label>Range Start (HEX)
<input id="start" value="4000000000000000000000000000000000">
</label>

<label>Range End (HEX)
<input id="end" value="7fffffffffffffffffffffffffffffffff">
</label>

<label>Search % Start
<input id="p1" type="number" value="49">
</label>

<label>Search % End
<input id="p2" type="number" value="50">
</label>

</div>

<br>

<button id="start">Start</button>
<button id="stop" disabled>Stop</button>
<button id="reset">Reset</button>

<div class="box">
Status: <span id="status">Idle</span><br>
Round: <span id="round">0</span><br>
Jumps: <span id="jumps">0</span><br>
Speed: <span id="speed">0</span> ops/sec
</div>

<br>

<progress id="bar" value="0" max="100"></progress>

<div class="box log" id="log"></div>

<table>
<thead>
<tr>
<th>Type</th>
<th>WIF</th>
<th>Private Key</th>
</tr>
</thead>
<tbody id="result">
<tr><td colspan="3" style="text-align:center;color:#666">No result</td></tr>
</tbody>
</table>

</div>

<script id="worker" type="javascript/worker">
importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js');

const ec = new elliptic.ec("secp256k1");
const G = ec.g;

self.onmessage = function(e) {
    const { type } = e.data;

    if (type === "WORK") {
        let steps = 0;

        // simpele simulatie loop (niet geoptimaliseerd)
        let p = G;

        for (let i = 0; i < 20000; i++) {
            p = p.add(G);
            steps++;
        }

        self.postMessage({ type: "DONE", steps });
    }
};
</script>

<script>
let workers = [];
let running = false;
let total = 0;
let round = 0;
let startTime = 0;

const log = (t) => {
    document.getElementById("log").innerHTML += t + "<br>";
};

function makeWorker() {
    return new Worker(URL.createObjectURL(
        new Blob([document.getElementById("worker").textContent], { type: "text/javascript" })
    ));
}

function updateSpeed() {
    let s = (total / ((Date.now() - startTime) / 1000)).toFixed(0);
    document.getElementById("speed").innerText = s;
}

function run() {
    if (!running) return;

    round++;
    document.getElementById("round").innerText = round;
    document.getElementById("status").innerText = "Running";

    let wcount = parseInt(document.getElementById("workers").value);
    let done = 0;

    for (let i = 0; i < wcount; i++) {
        let w = makeWorker();
        workers.push(w);

        w.onmessage = (e) => {
            if (e.data.type === "DONE") {
                total += e.data.steps;
                done++;

                document.getElementById("jumps").innerText = total;
                updateSpeed();

                if (done === wcount) {
                    log("Round " + round + " finished");
                    setTimeout(run, 100);
                }
            }
        };

        w.postMessage({ type: "WORK" });
    }
}

document.getElementById("start").onclick = () => {
    running = true;
    startTime = Date.now();
    run();
};

document.getElementById("stop").onclick = () => {
    running = false;
    workers.forEach(w => w.terminate());
    workers = [];
    document.getElementById("status").innerText = "Stopped";
};

document.getElementById("reset").onclick = () => {
    total = 0;
    round = 0;
    document.getElementById("jumps").innerText = "0";
    document.getElementById("round").innerText = "0";
    document.getElementById("log").innerHTML = "";
};
</script>

</body>
</html>

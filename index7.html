<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kangaroo Solver - Range Test Fix</title>
    <style>
        body { font-family: monospace; background: #0b0f19; color: #00ff66; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #00ff66; }
        .controls { display: grid; gap: 10px; }
        input { background: #1f2937; color: #00ff66; border: 1px solid #00ff66; padding: 5px; }
        button { padding: 10px; cursor: pointer; font-weight: bold; }
        #stopBtn { background: #b91c1c; color: white; border: none; }
        #startBtn { background: #047857; color: white; border: none; }
        .log { background: #000; height: 150px; overflow-y: scroll; font-size: 12px; margin-top: 10px; border: 1px solid #374151; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3>🦘 Kangaroo Solver (Range Fix)</h3>
    <div class="controls">
        <div>Start (HEX): <input id="rangeStart" value="20000" style="width: 300px;"></div>
        <div>Eind (HEX): <input id="rangeEnd" value="3ffff" style="width: 300px;"></div>
        <div><button id="startBtn">Start Zoekopdracht</button> <button id="stopBtn">Stop</button></div>
    </div>
    <div class="stats-box">
        Status: <span id="statusTxt">Gestopt</span> | Vallen: <span id="trapCount">0</span>
    </div>
    <div class="log" id="logBox">-- Systeem gereed --</div>
</div>

<script id="workerCode" type="javascript/worker">
    importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js');
    const ec = new elliptic.ec("secp256k1");
    const G = ec.g;

    self.onmessage = function(e) {
        const { type, start, end, targetPub, traps } = e.data;
        const rangeStart = BigInt("0x" + start);
        const rangeEnd = BigInt("0x" + end);
        const W = rangeEnd - rangeStart;
        
        // Dynamische jump sizing op basis van bereik
        const NUM_STEPS = 16; 
        const JUMP_SIZES = [];
        const JUMP_POINTS = [];
        let stepSize = W / BigInt(NUM_STEPS * 2); 
        if(stepSize < 1n) stepSize = 1n;

        for(let i=0; i<NUM_STEPS; i++) {
            let s = stepSize * BigInt(i + 1);
            JUMP_SIZES.push(s);
            JUMP_POINTS.push(G.mul(s.toString(16)));
        }

        if(type === "TAME") {
            let localTraps = {};
            for(let i=0; i<1000; i++) {
                let k = rangeStart + BigInt(Math.floor(Math.random() * Number(W)));
                let P = G.mul(k.toString(16));
                let dist = 0n;
                for(let j=0; j<50; j++) {
                    let h = P.encode('hex', true);
                    // Grotere filter-kans voor kleine ranges
                    if((parseInt(h.substr(-2), 16) & 0x0F) === 0) {
                        localTraps[h] = { k: k.toString(16), dist: dist.toString() };
                    }
                    let r = parseInt(h.substr(2, 2), 16) % NUM_STEPS;
                    P = P.add(JUMP_POINTS[r]);
                    dist += JUMP_SIZES[r];
                }
            }
            self.postMessage({ type: "TRAPS", traps: localTraps });
        } else {
            // Wilde jacht logica
            let P = ec.keyFromPublic(targetPub, 'hex').getPublic();
            for(let i=0; i<100000; i++) {
                let h = P.encode('hex', true);
                if(traps[h]) {
                    self.postMessage({ type: "FOUND", match: h });
                    break;
                }
                let r = parseInt(h.substr(2, 2), 16) % NUM_STEPS;
                P = P.add(JUMP_POINTS[r]);
            }
        }
    };
</script>

<script>
    let workers = [];
    const logBox = document.getElementById('logBox');
    
    function log(m) { logBox.innerHTML += m + "<br>"; logBox.scrollTop = logBox.scrollHeight; }

    document.getElementById('startBtn').onclick = () => {
        const start = document.getElementById('rangeStart').value;
        const end = document.getElementById('rangeEnd').value;
        const blob = new Blob([document.getElementById('workerCode').textContent], {type: 'text/javascript'});
        const w = new Worker(URL.createObjectURL(blob));
        workers.push(w);
        
        log("Netwerk opbouwen...");
        w.postMessage({ type: "TAME", start, end });
        
        w.onmessage = (e) => {
            if(e.data.type === "TRAPS") {
                log("Netwerk klaar (" + Object.keys(e.data.traps).length + " vallen). Start jacht...");
                w.postMessage({ type: "WILD", start, end, targetPub: "02145d2611c823a396ef6712ce0f712f09b9b4f3135e3e0aa3230fb9b6d08d1e16", traps: e.data.traps });
            } else if(e.data.type === "FOUND") {
                log("MATCH GEVONDEN: " + e.data.match);
            }
        };
    };

    document.getElementById('stopBtn').onclick = () => {
        workers.forEach(w => w.terminate());
        workers = [];
        log("Gestopt.");
    };
</script>
</body>
</html>

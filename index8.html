<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Satoshi 2009 Entropy Simulator - Full View</title>
<style>
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff00; padding: 20px; }
    h2 { border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
    .form-group { margin-bottom: 5px; }
    label { display: inline-block; width: 180px; color: #ccc; font-size: 11px; }
    input { width: 70px; background: #111; color: #00ff00; border: 1px solid #333; padding: 2px; font-size: 11px; }
    button { padding: 10px 20px; cursor: pointer; border: 1px solid #00ff00; margin-top: 10px; margin-right: 5px; font-weight: bold; }
    #startBtn { background: #003300; } #stopBtn { background: #330000; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 10px; color: #fff; }
    th, td { border: 1px solid #222; padding: 6px; text-align: left; word-break: break-all; }
    th { background: #1a1a1a; }
</style>
</head>
<body>
<h2>Satoshi 2009 Environment Mixer (Full View)</h2>
<div id="inputs">
    <div class="form-group"><label>Time (Start/End):</label><input id="tS" value="1231665341"><input id="tE" value="1231665400"></div>
    <div class="form-group"><label>QueryPerfCounter:</label><input id="qS" value="700000000"><input id="qE" value="701000000"></div>
    <div class="form-group"><label>Windows Tick:</label><input id="tkS" value="0"><input id="tkE" value="65535"></div>
    <div class="form-group"><label>PID (Start/End):</label><input id="pS" type="number" value="4" step="4" min="4"><input id="pE" type="number" value="1024" step="4" min="4"></div>
    <div class="form-group"><label>TID (Start/End):</label><input id="tiS" type="number" value="1024" step="4" min="4"><input id="tiE" type="number" value="4096" step="4" min="4"></div>
    <div class="form-group"><label>RAM (Avail/Used):</label><input id="rS" value="512"><input id="rE" value="2048"></div>
    <div class="form-group"><label>System Uptime (ms):</label><input id="sS" value="10000"><input id="sE" value="3600000"></div>
    <div class="form-group"><label>Disk Serial (Min/Max):</label><input id="dS" value="A1B2C3D4"><input id="dE" value="A1B2C3D4"></div>
    <div class="form-group"><label>Vol Serial (Min/Max):</label><input id="vS" value="E5F67890"><input id="vE" value="E5F67890"></div>
    <div class="form-group"><label>Env Hash (Min/Max):</label><input id="eS" value="10000000"><input id="eE" value="FFFFFFFF"></div>
    <div class="form-group"><label>Workers:</label><input id="numW" value="4" style="width:50px"></div>
</div>

<button id="startBtn">Start Scan</button><button id="stopBtn" disabled>Stop</button>
<div id="totaal" style="margin-top:10px;">Totaal gescand: 0</div>
<table id="resultTable"><thead><tr><th style="width: 30%;">BTC Adres</th><th style="width: 60%;">WIF Private Key</th><th style="width: 10%;">Status</th></tr></thead><tbody></tbody></table>

<script>
const TARGETS = [
    "1FeexV6bAHb8ybZjqQMjJrcCrHGW9sb6uF", "12tkqA9xSoowkzoERHMWNKsTey55YEBqkv",
    "12ib7dApVFvg82TXKycWBNpN8kFyiAN1dr", "1PeizMg76Cf96nUQrYg8xuoZWLQozU5zGW",
    "198aMn6ZYAczwrE5NvNTUMyJ5qkfy4g3Hi", "1HLvaTs3zR3oev9ya7Pzp3GB9Gqfg6XYJT",
    "1Kf33BbrJDuAVC91w9ACtRgf6KJrLWSkHV", "167ZWTT8n6s4ya8cGjqNNQjDwDGY31vmHg",
    "1GoEGp5LxydquYXp7zuBpVWnp8gzsNgQQS", "1GDWUJyvtsyFKNjBvH6hpLE3CdaXx33dxP",
    "1GDu4EUz2KgeYT4CukDS3qNkiCzg1UfqRA"
];

const workerCode = `
importScripts('https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js');
const ec = new elliptic.ec("secp256k1");
function toH(n) { return BigInt(n).toString(16).padStart(8, '0'); }
function getR(min, max) { return Math.floor(Math.random() * (Number(max) - Number(min) + 1)) + Number(min); }
function getHexR(minH, maxH) { return Math.floor(Math.random() * (parseInt(maxH, 16) - parseInt(minH, 16) + 1) + parseInt(minH, 16)).toString(16).toUpperCase().padStart(8, '0'); }
function sha256(h) { return CryptoJS.SHA256(CryptoJS.enc.Hex.parse(h)).toString(); }

self.onmessage = function(e){
    const { r: p, targets } = e.data;
    const set = new Set(targets);
    let buffer = [];
    while(true) {
        let items = [toH(getR(p.tS, p.tE)), toH(getR(p.qS, p.qE)), toH(p.tkS), toH(getR(p.pS, p.pE)), toH(getR(p.tiS, p.tiE)), toH(getR(p.rS, p.rE)), toH(getR(p.sS, p.sE)), getHexR(p.dS, p.dE), getHexR(p.vS, p.vE), getHexR(p.eS, p.eE)];
        let ghostNoiseCount = getR(1, 5);
        for(let i = 0; i < ghostNoiseCount; i++) items.splice(getR(0, items.length), 0, toH(getR(0, 0xFFFFFFFF)));
        
        let targetLen = getR(80, 140);
        while(items.length < targetLen) items.push(toH(getR(0, 0xFFFFFFFF)));
        
        items.sort(() => Math.random() - 0.5);
        let pool = "0000000000000000000000000000000000000000";
        items.forEach(i => { pool = CryptoJS.SHA1(CryptoJS.enc.Hex.parse(pool + i)).toString(); });
        
        let priv = sha256(pool);
        let pub = ec.keyFromPrivate(priv, 'hex').getPublic(false, 'hex');
        let rip = CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(sha256(pub))).toString();
        let addr = "1" + base58("00" + rip + sha256(sha256("00" + rip)).slice(0,8));
        let wif = base58("80" + priv + sha256(sha256("80" + priv)).slice(0,8));
        
        if(set.has(addr)) { self.postMessage({match: true, addr, wif}); break; }
        buffer.push({addr, wif});
        if(buffer.length >= 10) { self.postMessage({match: false, buffer}); buffer = []; }
    }
};
function base58(h) {
    const a = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let n = BigInt("0x" + h), o = "";
    while(n > 0n) { o = a[Number(n % 58n)] + o; n /= 58n; }
    return o;
}
`;

let workers = [], count = 0;
document.getElementById("startBtn").onclick = function() {
    this.disabled = true; document.getElementById("stopBtn").disabled = false;
    const p = { tS: document.getElementById("tS").value, tE: document.getElementById("tE").value, qS: document.getElementById("qS").value, qE: document.getElementById("qE").value, tkS: document.getElementById("tkS").value, pS: document.getElementById("pS").value, pE: document.getElementById("pE").value, tiS: document.getElementById("tiS").value, tiE: document.getElementById("tiE").value, rS: document.getElementById("rS").value, rE: document.getElementById("rE").value, sS: document.getElementById("sS").value, sE: document.getElementById("sE").value, dS: document.getElementById("dS").value, dE: document.getElementById("dE").value, vS: document.getElementById("vS").value, vE: document.getElementById("vE").value, eS: document.getElementById("eS").value, eE: document.getElementById("eE").value };
    
    for(let i=0; i<document.getElementById("numW").value; i++) {
        let w = new Worker(URL.createObjectURL(new Blob([workerCode])));
        w.postMessage({ r: p, targets: TARGETS });
        w.onmessage = function(e) {
            if(e.data.match) {
                workers.forEach(w => w.terminate()); workers = [];
                document.getElementById("startBtn").disabled = false; document.getElementById("stopBtn").disabled = true;
                let row = document.getElementById("resultTable").tBodies[0].insertRow(0);
                row.innerHTML = `<td style="color:yellow;">${e.data.addr}</td><td style="color:yellow;">${e.data.wif}</td><td>MATCH!</td>`;
                alert("MATCH FOUND!\nAdres: " + e.data.addr + "\nWIF: " + e.data.wif);
            } else {
                count += 10;
                document.getElementById("totaal").innerText = "Totaal gescand: " + count;
                e.data.buffer.forEach(item => {
                    let row = document.getElementById("resultTable").tBodies[0].insertRow(0);
                    row.innerHTML = `<td>${item.addr}</td><td>${item.wif}</td><td>...</td>`;
                    if(document.getElementById("resultTable").rows.length > 8) document.getElementById("resultTable").deleteRow(8);
                });
            }
        };
        workers.push(w);
    }
};

document.getElementById("stopBtn").onclick = function() {
    workers.forEach(w => w.terminate()); workers = [];
    document.getElementById("startBtn").disabled = false; this.disabled = true;
};
</script>
</body>
</html>

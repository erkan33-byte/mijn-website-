<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>BTC Pro Hunter: Precise Edition</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        input { background: #111; color: #0f0; border: 1px solid #333; padding: 5px; }
        button { font-weight: bold; padding: 5px 15px; cursor: pointer; }
        #startBtn { background: #0f0; } #stopBtn { background: #f00; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; font-size: 11px; }
    </style>
</head>
<body>
    <h2>BTC Pro Hunter: Precise Edition</h2>
    Zoekwoord (WIF): <input type="text" id="zoek" value="5">
    <button id="startBtn" onclick="start()">START SCAN</button>
    <button id="stopBtn" onclick="stop()" disabled>STOP SCAN</button>
    <div id="stat">Status: Gereed</div>
    <table>
        <thead><tr><th>Status</th><th>WIF</th><th>Adres</th><th>Saldo</th></tr></thead>
        <tbody id="tabel"></tbody>
    </table>

<script id="workerScript" type="javascript/worker">
    importScripts('https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js',
                  'https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js');

    const ec = new elliptic.ec("secp256k1");
    const B58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

    // Officiële Base58Check encoder
    function toB58(buf) {
        let n = BigInt("0x" + buf);
        let res = "";
        while (n > 0n) { res = B58[Number(n % 58n)] + res; n /= 58n; }
        // Handle leading zero bytes
        for (let i = 0; i < buf.length; i += 2) {
            if (buf.substr(i, 2) === "00") res = "1" + res;
            else break;
        }
        return res;
    }

    self.onmessage = async (e) => {
        let { startTs, zoek } = e.data;
        let ts = startTs;
        while(true) {
            let hash = CryptoJS.SHA256(ts.toString()).toString();
            let priv = hash.substring(0, 64);
            
            // WIF (Uncompressed)
            let wifHex = "80" + priv;
            let hash1 = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(wifHex)).toString();
            let hash2 = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(hash1)).toString();
            let wif = toB58(wifHex + hash2.substring(0, 8));

            if(wif.includes(zoek)) {
                // Adres (Uncompressed)
                let pub = ec.keyFromPrivate(priv, 'hex').getPublic(false, 'hex');
                let sha = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(pub)).toString();
                let rip = CryptoJS.RIPEMD160(CryptoJS.enc.Hex.parse(sha)).toString();
                let addrHex = "00" + rip;
                let h1 = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(addrHex)).toString();
                let h2 = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(h1)).toString();
                let address = toB58(addrHex + h2.substring(0, 8));

                self.postMessage({ type: 'MATCH', wif, address });
            }
            ts += 4;
            if(ts % 500 === 0) self.postMessage({ type: 'STATUS', ts });
        }
    };
</script>

<script>
    let workers = [];
    async function checkBalance(addr) {
        try {
            // Gebruik Blockchair voor de meest betrouwbare check
            let res = await fetch('https://api.blockchair.com/bitcoin/dashboards/address/' + addr);
            let d = await res.json();
            return d.data[addr].address.balance / 100000000;
        } catch(e) { return 0; }
    }

    function stop() {
        workers.forEach(w => w.terminate());
        workers = [];
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('stat').innerText = "Status: Gestopt";
    }

    function start() {
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        const blob = new Blob([document.getElementById('workerScript').textContent], {type: 'text/javascript'});
        
        for(let i=0; i<4; i++) {
            let w = new Worker(URL.createObjectURL(blob));
            w.postMessage({ startTs: 1230768000000 + i, zoek: document.getElementById('zoek').value });
            w.onmessage = async (e) => {
                if(e.data.type === 'STATUS') {
                    document.getElementById('stat').innerText = "Scannen: " + e.data.ts;
                } else {
                    let row = document.getElementById('tabel').insertRow(0);
                    row.innerHTML = `<td>Checking...</td><td>${e.data.wif}</td><td>${e.data.address}</td><td>...</td>`;
                    let bal = await checkBalance(e.data.address);
                    row.cells[0].innerText = bal > 0 ? "JACKPOT!" : "GECONTROLEERD";
                    row.cells[3].innerText = bal + " BTC";
                    if(bal > 0) { alert("SALDO GEVONDEN: " + bal); stop(); }
                }
            };
            workers.push(w);
        }
    }
</script>
</body>
</html>
